<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masterplan tương tác</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #0d0d0d;
  }

  .map-wrap {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
    line-height: 0; /* tránh khoảng trắng dưới ảnh */
  }

  .map-wrap img.masterplan {
    width: 100%;
    height: auto;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ===== HOTSPOT trên bản đồ (toạ độ % theo ảnh gốc) ===== */
  .hotspot {
    position: absolute;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .hotspot:hover {
    background: rgba(255, 149, 0, 0.28);
    border-color: #FF9500;
  }
  .hotspot .zone-label {
    position: absolute;
    top: 4px;
    left: 4px;
    background: #FF9500;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .hotspot:hover .zone-label {
    opacity: 1;
  }

  /* ===== MODAL hiện mẫu nhà ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 60px 20px 20px;
  }
  .modal-overlay.active {
    display: flex;
  }
  .modal-box {
    position: relative;
    max-width: 95vw;
    max-height: calc(92vh - 40px);
    overflow: auto;
    background: #111;
    border-radius: 8px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .modal-box img {
    max-width: 95vw;
    max-height: calc(92vh - 40px);
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
  }
  /* Nút đóng + tiêu đề đặt CỐ ĐỊNH theo màn hình (fixed), không bị cuộn trôi mất dù ảnh dài */
  .modal-close {
    position: fixed;
    top: 14px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    border: 2px solid #fff;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    z-index: 1001;
  }
  .modal-close:hover {
    background: rgba(255,149,0,0.95);
  }
  .modal-title {
    position: fixed;
    top: 18px;
    left: 20px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 6px;
    z-index: 1001;
  }

  /* ===== CHẾ ĐỘ CHỈNH VÙNG (calibration) ===== */
  .calib-toggle-btn {
    position: fixed;
    top: 14px;
    right: 20px;
    z-index: 1000;
    background: #FF9500;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .calib-toggle-btn.on {
    background: #d32f2f;
  }
  .calib-draw-box {
    position: absolute;
    border: 2px dashed #00e5ff;
    background: rgba(0,229,255,0.15);
    pointer-events: none;
    display: none;
  }
  .calib-panel {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    max-width: 700px;
    background: #111;
    color: #0f0;
    font-family: monospace;
    font-size: 13px;
    padding: 14px;
    border-radius: 8px;
    z-index: 1000;
    display: none;
    white-space: pre-wrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  .calib-panel.show { display: block; }
  .calib-panel button {
    margin-top: 8px;
    background: #FF9500;
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 12px;
  }
</style>
</head>
<body>

  <button class="calib-toggle-btn" id="calibToggle">🎯 Chế độ chỉnh vùng: TẮT</button>

  <div class="map-wrap" id="mapWrap">
    <img class="masterplan"
         src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png"
         alt="Masterplan">
    <!-- hotspot sẽ được JS chèn tự động từ config bên dưới -->
    <div class="calib-draw-box" id="calibDrawBox"></div>
  </div>

  <div class="calib-panel" id="calibPanel">
    <div id="calibResult">Kéo chuột trên ảnh để vẽ 1 khung → toạ độ % sẽ hiện ở đây.</div>
    <button id="calibCopyBtn">📋 Copy dòng code</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-title" id="modalTitle"></div>
      <img id="modalImg" src="" alt="Mẫu nhà">
    </div>
  </div>

  <script>
    // ⚠️ CONFIG — chỉnh sửa toạ độ (top/left/width/height tính theo % ảnh gốc)
    // và gán đúng ảnh mẫu nhà (M2..M6) cho từng khu vực (A-L) tại đây.
    // Toạ độ dưới đây là ước lượng ban đầu dựa theo layout — cần bạn tinh chỉnh lại
    // bằng cách kéo thử từng khối cho khớp đúng vị trí từng khu trên ảnh thật.
    const zones = [
      { id: 'H', top: 15, left: 46, width: 15, height: 13, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', title: 'MẪU NHÀ 3 | Khu H' },
      { id: 'I', top: 15, left: 62, width: 10, height: 18, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', title: 'MẪU NHÀ 3 | Khu I' },
      { id: 'K', top: 15, left: 73, width: 12, height: 18, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', title: 'MẪU NHÀ 3 | Khu K' },
      { id: 'L', top: 15, left: 86, width: 12, height: 30, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', title: 'MẪU NHÀ 3 | Khu L' },
      { id: 'G', top: 39, left: 46, width: 9, height: 10, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', title: 'MẪU NHÀ 2 | Khu G' },
      { id: 'A', top: 49, left: 43, width: 10, height: 9, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', title: 'MẪU NHÀ 2 | Khu A' },
      { id: 'B', top: 58, left: 18, width: 10, height: 13, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', title: 'MẪU NHÀ 4 | Khu B' },
      { id: 'C', top: 60, left: 46, width: 12, height: 20, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', title: 'MẪU NHÀ 4 | Khu C' },
      { id: 'F', top: 47, left: 60, width: 12, height: 18, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg', title: 'MẪU NHÀ 5 | Khu F' },
      { id: 'E', top: 47, left: 75, width: 10, height: 18, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg', title: 'MẪU NHÀ 5 | Khu E' },
      { id: 'D', top: 78, left: 60, width: 12, height: 15, image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg', title: 'MẪU NHÀ 6 | Khu D' }
    ];

    const mapWrap = document.getElementById('mapWrap');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalClose = document.getElementById('modalClose');

    zones.forEach(zone => {
      const div = document.createElement('div');
      div.className = 'hotspot';
      div.style.top = zone.top + '%';
      div.style.left = zone.left + '%';
      div.style.width = zone.width + '%';
      div.style.height = zone.height + '%';
      div.innerHTML = '<span class="zone-label">Khu ' + zone.id + '</span>';
      div.onclick = () => openModal(zone);
      mapWrap.appendChild(div);
    });

    function openModal(zone) {
      modalImg.src = zone.image;
      modalTitle.textContent = zone.title;
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      modalImg.src = '';
    }

    modalClose.onclick = closeModal;
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ===== CHẾ ĐỘ CHỈNH VÙNG: kéo chuột vẽ khung -> tự tính % để copy vào config =====
    let calibOn = false;
    const calibToggle = document.getElementById('calibToggle');
    const calibDrawBox = document.getElementById('calibDrawBox');
    const calibPanel = document.getElementById('calibPanel');
    const calibResult = document.getElementById('calibResult');
    const calibCopyBtn = document.getElementById('calibCopyBtn');
    const masterplanImg = document.querySelector('.masterplan');
    let lastCodeLine = '';
    let drawing = false, startX = 0, startY = 0;

    calibToggle.onclick = () => {
      calibOn = !calibOn;
      calibToggle.textContent = calibOn ? '🎯 Chế độ chỉnh vùng: BẬT (kéo chuột trên ảnh)' : '🎯 Chế độ chỉnh vùng: TẮT';
      calibToggle.classList.toggle('on', calibOn);
      calibPanel.classList.toggle('show', calibOn);
      // Khi bật calib, ẩn hotspot để không bị chặn thao tác kéo chuột
      document.querySelectorAll('.hotspot').forEach(h => {
        h.style.pointerEvents = calibOn ? 'none' : 'auto';
      });
    };

    mapWrap.addEventListener('mousedown', (e) => {
      if (!calibOn) return;
      const rect = masterplanImg.getBoundingClientRect();
      startX = e.clientX - rect.left;
      startY = e.clientY - rect.top;
      drawing = true;
      calibDrawBox.style.display = 'block';
      calibDrawBox.style.left = startX + 'px';
      calibDrawBox.style.top = startY + 'px';
      calibDrawBox.style.width = '0px';
      calibDrawBox.style.height = '0px';
    });

    window.addEventListener('mousemove', (e) => {
      if (!calibOn || !drawing) return;
      const rect = masterplanImg.getBoundingClientRect();
      const curX = e.clientX - rect.left;
      const curY = e.clientY - rect.top;
      const left = Math.min(startX, curX);
      const top = Math.min(startY, curY);
      const w = Math.abs(curX - startX);
      const h = Math.abs(curY - startY);
      calibDrawBox.style.left = left + 'px';
      calibDrawBox.style.top = top + 'px';
      calibDrawBox.style.width = w + 'px';
      calibDrawBox.style.height = h + 'px';
    });

    window.addEventListener('mouseup', () => {
      if (!calibOn || !drawing) return;
      drawing = false;
      const rect = masterplanImg.getBoundingClientRect();
      const boxRect = calibDrawBox.getBoundingClientRect();
      const topPct = ((boxRect.top - rect.top) / rect.height * 100).toFixed(2);
      const leftPct = ((boxRect.left - rect.left) / rect.width * 100).toFixed(2);
      const widthPct = (boxRect.width / rect.width * 100).toFixed(2);
      const heightPct = (boxRect.height / rect.height * 100).toFixed(2);
      lastCodeLine = "{ id: 'X', top: " + topPct + ", left: " + leftPct + ", width: " + widthPct + ", height: " + heightPct + ", image: 'URL_MAU_NHA', title: 'MẪU NHÀ ... | Khu X' },";
      calibResult.textContent = lastCodeLine;
    });

    calibCopyBtn.onclick = () => {
      if (!lastCodeLine) return;
      navigator.clipboard.writeText(lastCodeLine).then(() => {
        calibCopyBtn.textContent = '✅ Đã copy!';
        setTimeout(() => { calibCopyBtn.textContent = '📋 Copy dòng code'; }, 1500);
      });
    };
  </script>

</body>
</html>
