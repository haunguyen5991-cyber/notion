<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Windows 8 Metro Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow-x: auto; /* Cho phép cuộn ngang chuẩn Windows 8 */
    overflow-y: hidden;
  }

  /* KHUNG CHỨA PHONG CÁCH WINDOWS 8 CUỘN NGANG */
  .metro-gallery {
    height: 100vh;
    padding: 40px;
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    background: #fff;
    min-width: 100vw;
  }

  .metro-title {
    font-size: 28px;
    font-weight: 300;
    color: #000;
    margin-bottom: 20px;
    padding-left: 5px;
    text-transform: lowercase;
  }
  .metro-title::first-letter {
    text-transform: uppercase;
  }

  /* KHUNG LƯỚI Ô GẠCH (METRO GRID) */
  .metro-grid {
    display: grid;
    grid-template-rows: repeat(2, 220px); /* Chia làm 2 hàng cố định */
    grid-auto-flow: column; /* Tự động tràn ô gạch theo chiều ngang */
    grid-auto-columns: 220px; /* Chiều rộng mặc định của một ô vuông */
    gap: 15px;
  }

  /* ĐỊNH DẠNG Ô GẠCH TRONG WINDOWS 8 (TILES) */
  .tile {
    position: relative;
    background: #f0f0f0;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 0 0 0 transparent;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }

  /* Hiệu ứng nhấn lún nhẹ đặc trưng của ô gạch Windows 8 khi click */
  .tile:active {
    transform: scale(0.97);
  }

  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* CÁC KÍCH THƯỚC Ô GẠCH ĐAN XEN NHAU */
  .tile.square-large {
    grid-row: span 2;
    grid-column: span 2;
  }
  .tile.wide {
    grid-column: span 2;
  }
  .tile.normal {
    grid-row: span 1;
    grid-column: span 1;
  }

  /* CẤU HÌNH RESPONSIVE CHO MOBILE (CHUYỂN SANG CUỘN DỌC ĐỂ DỄ XEM) */
  @media (max-width: 768px) {
    html, body { overflow-y: auto; overflow-x: hidden; }
    .metro-gallery { height: auto; display: block; padding: 20px; width: 100%; }
    .metro-title { font-size: 22px; margin-bottom: 15px; }
    .metro-grid {
      grid-template-rows: auto;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-flow: row;
      gap: 10px;
    }
    .tile.square-large { grid-row: span 2; grid-column: span 2; }
    .tile.wide { grid-column: span 2; }
    .tile.normal { grid-row: span 1; grid-column: span 1; }
    .metro-grid { grid-auto-columns: auto; }
  }

  /* ===== CHẾ ĐỘ PHÓNG TO ẢNH (LIGHTBOX OVERLAY) ===== */
  .lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.98);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #mainMediaWrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #mainMediaWrap img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    transform-origin: center center;
    will-change: transform;
    cursor: zoom-in;
  }

  #mainMediaWrap img.zoomed { cursor: grab; }
  #mainMediaWrap img.zoomed.dragging { cursor: grabbing; }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: rgba(0, 0, 0, 0.05);
    border: none;
    border-radius: 50%;
    color: #333;
    font-size: 24px;
    font-weight: 300;
    line-height: 40px;
    text-align: center;
    cursor: pointer;
    z-index: 1100;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(0, 0, 0, 0.1); }

  /* BỘ ĐIỀU KHIỂN ZOOM MỎNG TINH TẾ TỰ ĐỘNG CĂN GIỮA */
  .bottom-controls-container {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    z-index: 1050;
    background: rgba(255, 255, 255, 0.85);
    padding: 4px 10px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .main-map-controls {
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .main-map-controls span {
    font-size: 11px;
    color: #333;
    font-weight: bold;
  }
  
  .main-map-controls input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 3px;
    background: rgba(0,0,0,0.15);
    outline: none;
  }

  .main-map-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #ff9900;
    border-radius: 50%;
    cursor: pointer;
  }

  .brand-label {
    font-size: 11px;
    color: rgba(0, 0, 0, 0.5);
    border-left: 1px solid rgba(0, 0, 0, 0.15);
    padding-left: 8px;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    .bottom-controls-container {
      right: 50%;
      transform: translateX(50%);
      bottom: 25px;
    }
  }
</style>
</head>
<body>

  <div class="metro-gallery">
    <div class="metro-title">Hình ảnh dự án</div>
    
    <div class="metro-grid" id="metroGrid">
      <div class="tile square-large" onclick="openLightbox(0)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709033/28073e86-c66a-41ca-9ec8-b27f78539729.png" loading="lazy">
      </div>
      <div class="tile wide" onclick="openLightbox(1)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709045/de8e500c-60f8-4a48-a53a-e7ebab07ed2a.png" loading="lazy">
      </div>
      <div class="tile normal" onclick="openLightbox(2)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709055/d9b325e9-e692-45c9-bad9-79c5eb6a99a9.png" loading="lazy">
      </div>
      <div class="tile normal" onclick="openLightbox(3)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709065/ecc0e40a-e90c-4cc9-8d8a-17f43e9b561b.png" loading="lazy">
      </div>
      <div class="tile wide" onclick="openLightbox(4)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709078/79554724-4135-404a-a00c-bf50786e1122.png" loading="lazy">
      </div>
      <div class="tile normal" onclick="openLightbox(5)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709092/f6763012-8d3c-4854-a34f-55ae93672295.png" loading="lazy">
      </div>
      <div class="tile normal" onclick="openLightbox(6)">
        <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709102/2b16175c-d755-47fd-8317-f57fef41db6b.png" loading="lazy">
      </div>
      <div class="tile wide" onclick="openLightbox(7)">
        <img src="https://bcons.vn/wp-content/uploads/2025/10/anh-thuc-te-bcons-city-3.jpg" loading="lazy">
      </div>
    </div>
  </div>

  <div class="lightbox-overlay" id="lightboxOverlay">
    <button class="close-btn" id="closeBtn" title="Đóng (Esc)">&times;</button>
    <div id="mainMediaWrap"></div>
    
    <div class="bottom-controls-container" id="controlsContainer">
      <div class="main-map-controls">
        <span>-</span>
        <input type="range" id="mediaZoomSlider" min="1" max="5" step="0.05" value="1">
        <span>+</span>
      </div>
      <div class="brand-label">dulieunhapho.com</div>
    </div>
  </div>

  <script>
    const imageUrls = [
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709033/28073e86-c66a-41ca-9ec8-b27f78539729.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709045/de8e500c-60f8-4a48-a53a-e7ebab07ed2a.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709055/d9b325e9-e692-45c9-bad9-79c5eb6a99a9.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709065/ecc0e40a-e90c-4cc9-8d8a-17f43e9b561b.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709078/79554724-4135-404a-a00c-bf50786e1122.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709092/f6763012-8d3c-4854-a34f-55ae93672295.png',
      'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709102/2b16175c-d755-47fd-8317-f57fef41db6b.png',
    ];

    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const mainMediaWrap = document.getElementById('mainMediaWrap');
    const closeBtn = document.getElementById('closeBtn');
    const zoomSlider = document.getElementById('mediaZoomSlider');

    function openLightbox(index) {
      const url = imageUrls[index];
      mainMediaWrap.innerHTML = `<img src="${url}" id="zoomableImg" alt="Phóng to">`;
      lightboxOverlay.style.display = 'flex';
      resetZoom();
      initZoomEvents();
    }

    function closeLightbox() {
      lightboxOverlay.style.display = 'none';
      mainMediaWrap.innerHTML = '';
    }

    closeBtn.onclick = closeLightbox;
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    // ===== TRÌNH ĐIỀU KHIỂN ZOOM CHO ẢNH PHÓNG TO =====
    let zScale = 1, zPanX = 0, zPanY = 0;
    let zDragging = false, zStartX = 0, zStartY = 0, zStartPanX = 0, zStartPanY = 0;
    const Z_MIN = 1, Z_MAX = 5;

    function applyZoomTransform() {
      const img = document.getElementById('zoomableImg');
      if (!img) return;
      img.style.transform = `translate(${zPanX}px, ${zPanY}px) scale(${zScale})`;
      img.classList.toggle('zoomed', zScale > Z_MIN);
      zoomSlider.value = zScale;
    }

    function resetZoom() {
      zScale = 1; zPanX = 0; zPanY = 0;
      applyZoomTransform();
    }

    function clampZoomPan() {
      const wrap = document.getElementById('mainMediaWrap');
      const maxPanX = (wrap.clientWidth * (zScale - 1)) / 2;
      const maxPanY = (wrap.clientHeight * (zScale - 1)) / 2;
      zPanX = Math.max(-maxPanX, Math.min(maxPanX, zPanX));
      zPanY = Math.max(-maxPanY, Math.min(maxPanY, zPanY));
    }

    function zoomAtPoint(delta, clientX, clientY, refEl) {
      const rect = refEl.getBoundingClientRect();
      const cx = clientX - rect.left - rect.width / 2;
      const cy = clientY - rect.top - rect.height / 2;

      const prevScale = zScale;
      zScale = Math.min(Z_MAX, Math.max(Z_MIN, zScale + delta));
      if (zScale === prevScale) return;

      const ratio = zScale / prevScale;
      zPanX = (zPanX - cx) * ratio + cx;
      zPanY = (zPanY - cy) * ratio + cy;

      if (zScale <= Z_MIN) { zPanX = 0; zPanY = 0; }
      clampZoomPan();
      applyZoomTransform();
    }

    zoomSlider.addEventListener('input', function(e) {
      const nextScale = parseFloat(e.target.value);
      const prevScale = zScale;
      zScale = nextScale;
      const ratio = zScale / prevScale;
      zPanX = zPanX * ratio;
      zPanY = zPanY * ratio;
      if (zScale <= Z_MIN) { zPanX = 0; zPanY = 0; }
      clampZoomPan();
      applyZoomTransform();
    });

    function initZoomEvents() {
      const wrap = document.getElementById('mainMediaWrap');

      wrap.onwheel = function(e) {
        e.preventDefault();
        zoomAtPoint(e.deltaY < 0 ? 0.25 : -0.25, e.clientX, e.clientY, wrap);
      };

      wrap.onmousedown = function(e) {
        if (zScale <= Z_MIN) return;
        zDragging = true;
        document.getElementById('zoomableImg').classList.add('dragging');
        zStartX = e.clientX; zStartY = e.clientY;
        zStartPanX = zPanX; zStartPanY = zPanY;
      };
      
      window.onmousemove = function(e) {
        if (!zDragging) return;
        zPanX = zStartPanX + (e.clientX - zStartX);
        zPanY = zStartPanY + (e.clientY - zStartY);
        clampZoomPan();
        applyZoomTransform();
      };
      
      window.onmouseup = function() {
        if (!zDragging) return;
        zDragging = false;
        const img = document.getElementById('zoomableImg');
        if (img) img.classList.remove('dragging');
      };

      wrap.ondblclick = function(e) {
        if (zScale > Z_MIN) resetZoom();
        else zoomAtPoint(1.5, e.clientX, e.clientY, wrap);
      };

      // Cảm ứng Mobile (Pinch to zoom & Drag)
      let zLastTouchDist = null;
      wrap.ontouchstart = function(e) {
        if (e.touches.length === 2) {
          zLastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        } else if (e.touches.length === 1 && zScale > Z_MIN) {
          zDragging = true;
          zStartX = e.touches[0].clientX; zStartY = e.touches[0].clientY;
          zStartPanX = zPanX; zStartPanY = zPanY;
        }
      };

      wrap.ontouchmove = function(e) {
        if (e.touches.length === 2 && zLastTouchDist !== null) {
          e.preventDefault();
          const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          zoomAtPoint((dist - zLastTouchDist) * 0.01, midX, midY, wrap);
          zLastTouchDist = dist;
        } else if (e.touches.length === 1 && zDragging) {
          e.preventDefault();
          zPanX = zStartPanX + (e.touches[0].clientX - zStartX);
          zPanY = zStartPanY + (e.touches[0].clientY - zStartY);
          clampZoomPan();
          applyZoomTransform();
        }
      };

      wrap.ontouchend = function(e) {
        if (e.touches.length < 2) zLastTouchDist = null;
        if (e.touches.length === 0) zDragging = false;
      };
    }
  </script>
</body>
</html>
