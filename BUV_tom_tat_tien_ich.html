<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .gallery {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    position: relative;
  }

  /* KHUNG HÌNH MAIN VIEW DUY NHẤT TRÀN MÀN HÌNH */
  .main-view {
    flex: 1;
    position: relative;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .counter {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 100;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  #mainMediaWrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    position: relative;
    overflow: hidden;
  }

  /* ĐẢM BẢO ẢNH FULL KHUNG HÌNH CHỐNG HỞ VIỀN TRẮNG */
  #mainMediaWrap img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform-origin: center center;
    will-change: transform;
  }

  /* NÚT ĐIỀU HƯỚNG TRÁI/PHẢI TINH TẾ (ẨN TRÊN MOBILE, DÙNG THAY THẾ THUMBNAIL) */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 45px;
    height: 45px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 50%;
    color: #333;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    user-select: none;
  }
  .nav-btn:hover {
    background: rgba(255, 255, 255, 0.95);
    transform: translateY(-50%) scale(1.05);
  }
  .prev-btn { left: 20px; }
  .next-btn { right: 20px; }

  /* BỘ ĐIỀU KHIỂN HỢP NHẤT HÀNG NGANG (MẶC ĐỊNH DESKTOP GÓC PHẢI) */
  .bottom-controls-container {
    position: absolute;
    bottom: 15px;
    right: 15px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    z-index: 500;
    background: rgba(255, 255, 255, 0.85);
    padding: 4px 10px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    transition: all 0.2s ease;
  }

  .main-map-controls {
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .main-map-controls span {
    font-size: 11px;
    font-family: Arial, sans-serif;
    color: #333;
    font-weight: bold;
  }
  
  .main-map-controls input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 3px;
    background: rgba(0,0,0,0.15);
    outline: none;
    border: none;
    cursor: pointer;
  }

  .main-map-controls input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #ff9900;
    border-radius: 50%;
    cursor: pointer;
  }

  .main-map-controls input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #ff9900;
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }

  .brand-label {
    font-size: 11px;
    font-family: Arial, sans-serif;
    color: rgba(0, 0, 0, 0.5);
    border-left: 1px solid rgba(0, 0, 0, 0.15);
    padding-left: 8px;
    pointer-events: none;
    user-select: none;
  }

  /* CẤU HÌNH CHO MOBILE: CĂN GIỮA TUYỆT ĐỐI BỘ ZOOM & ẨN NÚT BẤM (VÌ MOBILE VUỐT TRỰC TIẾP) */
  @media (max-width: 700px) {
    .bottom-controls-container {
      right: 50%;
      transform: translateX(50%);
      bottom: 20px;
    }
    .nav-btn { display: none; } /* Trên mobile vuốt màn hình để chuyển ảnh */
  }

  #mainMediaWrap img.zoomable { cursor: zoom-in; }
  #mainMediaWrap img.zoomable.zoomed { cursor: grab; }
  #mainMediaWrap img.zoomable.zoomed.dragging { cursor: grabbing; }
  
  .zoom-hint {
    position: absolute;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .main-view:hover .zoom-hint { opacity: 1; }
</style>
</head>
<body>
  <div class="gallery">
    <div class="main-view" id="mainView">
      <div class="counter" id="counter">1 / 8</div>
      <div class="zoom-hint" id="zoomHint">Cuộn chuột để phóng to • Kéo rê chuột hoặc vuốt để xem chi tiết</div>
      
      <button class="nav-btn prev-btn" id="prevBtn" title="Ảnh trước">&#10094;</button>
      <button class="nav-btn next-btn" id="nextBtn" title="Ảnh sau">&#10095;</button>

      <div id="mainMediaWrap"></div>
      
      <div class="bottom-controls-container" id="controlsContainer">
        <div class="main-map-controls">
          <span>-</span>
          <input type="range" id="mediaZoomSlider" min="1" max="5" step="0.05" value="1" title="Kéo để phóng to ảnh">
          <span>+</span>
        </div>
        <div class="brand-label">dulieunhapho.com</div>
      </div>
    </div>
  </div>

  <script>
    // TẬP HỢP ĐẦY ĐỦ VÀ CHÍNH XÁC DANH SÁCH CÁC HÌNH ẢNH DỰ ÁN
    const items = [
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709033/28073e86-c66a-41ca-9ec8-b27f78539729.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709045/de8e500c-60f8-4a48-a53a-e7ebab07ed2a.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709055/d9b325e9-e692-45c9-bad9-79c5eb6a99a9.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709065/ecc0e40a-e90c-4cc9-8d8a-17f43e9b561b.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709078/79554724-4135-404a-a00c-bf50786e1122.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709092/f6763012-8d3c-4854-a34f-55ae93672295.png' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783709102/2b16175c-d755-47fd-8317-f57fef41db6b.png' },
      { url: 'https://bcons.vn/wp-content/uploads/2025/10/anh-thuc-te-bcons-city-3.jpg' }
    ];

    let currentIndex = 0;
    const zoomSlider = document.getElementById('mediaZoomSlider');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function updateMain() {
      const item = items[currentIndex];
      const wrap = document.getElementById('mainMediaWrap');
      wrap.innerHTML = '';

      const imgEl = document.createElement('img');
      imgEl.src = item.url;
      imgEl.loading = 'lazy';
      imgEl.className = 'zoomable';
      wrap.appendChild(imgEl);

      document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + items.length;
      resetZoom();
    }

    // LOGIC CHUYỂN ĐỔI ẢNH QUA NÚT HOẶC PHÍM BẤM
    function nextImage() {
      currentIndex = (currentIndex + 1) % items.length;
      updateMain();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      updateMain();
    }

    nextBtn.onclick = nextImage;
    prevBtn.onclick = prevImage;

    document.addEventListener('keydown', (e) => {
      if (zScale > Z_MIN) return; // Nếu đang phóng to thì vô hiệu hóa nút chuyển ảnh bằng bàn phím
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    // ===== TRÌNH QUẢN LÝ ZOOM ĐỒNG BỘ SLIDER =====
    let zScale = 1, zPanX = 0, zPanY = 0;
    let zDragging = false, zStartX = 0, zStartY = 0, zStartPanX = 0, zStartPanY = 0;
    const Z_MIN = 1, Z_MAX = 5;

    function applyZoomTransform() {
      const img = document.querySelector('#mainMediaWrap img.zoomable');
      if (!img) return;
      img.style.transform = 'translate(' + zPanX + 'px,' + zPanY + 'px) scale(' + zScale + ')';
      img.classList.toggle('zoomed', zScale > Z_MIN);
      zoomSlider.value = zScale;
    }

    function resetZoom() {
      zScale = 1; zPanX = 0; zPanY = 0;
      applyZoomTransform();
    }

    function clampZoomPan() {
      const wrap = document.getElementById('mainMediaWrap');
      const maxPanX = (wrap.clientWidth * (zScale - 1)) / 2;
      const maxPanY = (wrap.clientHeight * (zScale - 1)) / 2;
      
      zPanX = Math.max(-maxPanX, Math.min(maxPanX, zPanX));
      zPanY = Math.max(-maxPanY, Math.min(maxPanY, zPanY));
    }

    function zoomAtPoint(delta, clientX, clientY, refEl) {
      const rect = refEl.getBoundingClientRect();
      const cx = clientX - rect.left - rect.width / 2;
      const cy = clientY - rect.top - rect.height / 2;

      const prevScale = zScale;
      zScale = Math.min(Z_MAX, Math.max(Z_MIN, zScale + delta));
      if (zScale === prevScale) return;

      const ratio = zScale / prevScale;
      zPanX = (zPanX - cx) * ratio + cx;
      zPanY = (zPanY - cy) * ratio + cy;

      if (zScale <= Z_MIN) { zPanX = 0; zPanY = 0; }
      clampZoomPan();
      applyZoomTransform();
    }

    zoomSlider.addEventListener('input', function(e) {
      const nextScale = parseFloat(e.target.value);
      const prevScale = zScale;
      zScale = nextScale;
      
      const ratio = zScale / prevScale;
      zPanX = zPanX * ratio;
      zPanY = zPanY * ratio;
      
      if (zScale <= Z_MIN) { zPanX = 0; zPanY = 0; }
      clampZoomPan();
      applyZoomTransform();
    });

    (function() {
      const wrap = document.getElementById('mainMediaWrap');

      wrap.addEventListener('wheel', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.25 : -0.25;
        zoomAtPoint(delta, e.clientX, e.clientY, wrap);
      }, { passive: false });

      wrap.addEventListener('mousedown', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img || zScale <= Z_MIN) return;
        zDragging = true;
        img.classList.add('dragging');
        zStartX = e.clientX; zStartY = e.clientY;
        zStartPanX = zPanX; zStartPanY = zPanY;
      });
      
      window.addEventListener('mousemove', function(e) {
        if (!zDragging) return;
        zPanX = zStartPanX + (e.clientX - zStartX);
        zPanY = zStartPanY + (e.clientY - zStartY);
        clampZoomPan();
        applyZoomTransform();
      });
      
      window.addEventListener('mouseup', function() {
        if (!zDragging) return;
        zDragging = false;
        const img = wrap.querySelector('img.zoomable');
        if (img) img.classList.remove('dragging');
      });

      wrap.addEventListener('dblclick', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        if (zScale > Z_MIN) {
          resetZoom();
        } else {
          zoomAtPoint(1.5, e.clientX, e.clientY, wrap);
        }
      });

      // HỖ TRỢ VUỐT CHUYỂN ẢNH KHI TRẠNG THÁI SCALE = 1 (CHO MOBILE)
      let touchStartX = 0;
      let touchEndX = 0;
      let zLastTouchDist = null;

      wrap.addEventListener('touchstart', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        
        if (e.touches.length === 2) {
          zLastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        } else if (e.touches.length === 1) {
          touchStartX = e.touches[0].clientX;
          if (zScale > Z_MIN) {
            zDragging = true;
            zStartX = e.touches[0].clientX; zStartY = e.touches[0].clientY;
            zStartPanX = zPanX; zStartPanY = zPanY;
          }
        }
      }, { passive: true });

      wrap.addEventListener('touchmove', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        
        if (e.touches.length === 2 && zLastTouchDist !== null) {
          e.preventDefault();
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          const delta = (dist - zLastTouchDist) * 0.01;
          zoomAtPoint(delta, midX, midY, wrap);
          zLastTouchDist = dist;
        } else if (e.touches.length === 1) {
          touchEndX = e.touches[0].clientX;
          if (zDragging) {
            e.preventDefault();
            zPanX = zStartPanX + (e.touches[0].clientX - zStartX);
            zPanY = zStartPanY + (e.touches[0].clientY - zStartY);
            clampZoomPan();
            applyZoomTransform();
          }
        }
      }, { passive: false });

      wrap.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) zLastTouchDist = null;
        if (e.touches.length === 0) {
          zDragging = false;
          // Logic vuốt màn hình chuyển ảnh (Chỉ kích hoạt khi scale = 1)
          if (zScale === 1) {
            const swipeDistance = touchStartX - touchEndX;
            if (swipeDistance > 60) nextImage(); // Vuốt sang trái -> Xem ảnh tiếp theo
            if (swipeDistance < -60) prevImage(); // Vuốt sang phải -> Xem ảnh trước đó
          }
        }
      }, { passive: true });
    })();

    // KHỞI CHẠY LẦN ĐẦU
    updateMain();
  </script>
</body>
</html>
