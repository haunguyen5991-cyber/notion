<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            height: auto;
        }
        
        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .regions-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
        }
        
        .region {
            flex: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        
        .region:hover {
            background: rgba(0, 0, 0, 0.15);
        }
        
        .region-label {
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            padding: 20px;
        }
        
        .region:hover .region-label {
            opacity: 1;
        }
        
        .region-title {
            font-weight: 700;
            font-size: clamp(12px, 3vw, 18px);
            margin-bottom: 4px;
        }
        
        .region-subtitle {
            font-size: clamp(10px, 2vw, 13px);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="map-container">
        <img src="https://res.cloudinary.com/your-cloud/image/upload/v123/bds-map.png" alt="Thiên Hạo House" />
        <div class="regions-overlay">
            <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-B-S-THEO-QU-N', '_blank')">
                <div class="region-label">
                    <div class="region-title">Lọc Theo Quận</div>
                    <div class="region-subtitle">Khám phá vị trí</div>
                </div>
            </div>
            <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-THEO-T-I-CH-NH', '_blank')">
                <div class="region-label">
                    <div class="region-title">Lọc Theo Tài Chính</div>
                    <div class="region-subtitle">Chọn giá</div>
                </div>
            </div>
            <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-THEO-U-T-N', '_blank')">
                <div class="region-label">
                    <div class="region-title">Danh Sách Chọn Lọc</div>
                    <div class="region-subtitle">Hot deals</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
