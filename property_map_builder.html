<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House - Bộ Lọc BĐS</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html, body { 
            height: 100%; 
            width: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: clamp(22px, 5vw, 32px);
            margin: 0;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }
        
        .map-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px 20px;
            min-height: 0;
            overflow: hidden;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 3 / 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: #f0f0f0;
        }
        
        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .regions-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
        }
        
        .region {
            flex: 1;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .region:hover {
            background: rgba(0,0,0,0.2);
        }
        
        .region-label {
            text-align: center;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
            padding: 0 10px;
        }
        
        .region:hover .region-label {
            opacity: 1;
        }
        
        .region-title {
            font-size: clamp(12px, 3vw, 18px);
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.2;
        }
        
        .region-subtitle {
            font-size: clamp(10px, 2vw, 14px);
            opacity: 0.9;
            line-height: 1.2;
        }
        
        .config-wrapper {
            background: white;
            flex-shrink: 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            margin: 0 10px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .config-wrapper h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #2c3e50;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .config-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }
        
        .config-item label {
            display: block;
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .config-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            margin-bottom: 6px;
        }
        
        .config-item input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.1);
        }
        
        .suggestions {
            font-size: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .suggestion-btn {
            background: white;
            border: 0.5px solid #ddd;
            padding: 4px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .suggestion-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #d5dbdd;
        }
        
        .status-message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
        }
        
        .status-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Mobile optimization */
        @media (max-width: 1024px) {
            .header {
                padding: 16px;
            }
            
            .map-wrapper {
                padding: 0 8px 16px;
            }
            
            .config-wrapper {
                max-height: 300px;
                padding: 16px;
                margin: 0 8px 16px;
            }
            
            .config-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 10px;
            }
        }
        
        @media (max-width: 640px) {
            .header {
                padding: 12px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .header p {
                font-size: 11px;
            }
            
            .map-wrapper {
                padding: 0 8px 12px;
            }
            
            .map-container {
                aspect-ratio: 16 / 9;
                border-radius: 8px;
            }
            
            .config-wrapper {
                max-height: 280px;
                padding: 12px;
                margin: 0 8px 12px;
                border-radius: 8px;
            }
            
            .config-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .config-item {
                padding: 10px;
            }
            
            .config-item label {
                font-size: 10px;
                margin-bottom: 4px;
            }
            
            .config-item input {
                padding: 6px;
                font-size: 11px;
                margin-bottom: 4px;
            }
            
            .action-buttons {
                gap: 6px;
            }
            
            button {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
        
        /* Scrollbar styling */
        .config-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        
        .config-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .config-wrapper::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
        
        .config-wrapper::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 Khám Phá Bất Động Sản Phù Hợp</h1>
        <p>Thiên Hạo House - Interactive Property Filter</p>
    </div>
    
    <div class="map-wrapper">
        <div class="map-container" id="preview">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center;">
                <div>
                    <div style="font-size: 32px; margin-bottom: 10px;">📷</div>
                    <div>Upload ảnh 3 cột để bắt đầu</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="config-wrapper">
        <div id="status" class="status-message"></div>
        
        <h2>⚙️ Cấu hình</h2>
        
        <div style="margin-bottom: 12px;">
            <label style="display: block; font-size: 12px; color: #7f8c8d; margin-bottom: 6px; font-weight: 600;">📸 Upload ảnh 3 cột</label>
            <input 
                type="file" 
                id="imageFile"
                accept="image/*"
                style="width: 100%; padding: 8px; font-size: 12px;"
            />
        </div>
        
        <div class="config-grid">
            <div class="config-item">
                <label>🔷 Vùng 1</label>
                <input 
                    type="text" 
                    id="link1"
                    placeholder="Link..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(1, 'https://dulieunhapho.notion.site/L-C-B-S-THEO-QU-N')">📋 Danh sách quận</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>🟩 Vùng 2</label>
                <input 
                    type="text" 
                    id="link2"
                    placeholder="Link..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(2, 'https://dulieunhapho.notion.site/L-C-THEO-T-I-CH-NH')">💰 Danh sách giá</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>⬜ Vùng 3</label>
                <input 
                    type="text" 
                    id="link3"
                    placeholder="Link..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(3, 'https://dulieunhapho.notion.site/L-C-THEO-U-T-N')">⭐ Danh sách hot</button>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn-primary" type="button" onclick="copyCode()">📋 Copy HTML</button>
            <button class="btn-secondary" type="button" onclick="downloadFile()">⬇️ Download</button>
            <button class="btn-secondary" type="button" onclick="testLinks()">🔗 Test</button>
        </div>
    </div>

    <script>
        let currentImageUrl = null;

        // Load image from file
        document.getElementById('imageFile').addEventListener('change', function(e) {
            if (this.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    setImagePreview(event.target.result);
                    showStatus('✅ Ảnh upload thành công', 'success');
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

        function setImagePreview(src) {
            currentImageUrl = src;
            const preview = document.getElementById('preview');
            preview.innerHTML = `
                <img src="${src}" alt="Property map" />
                <div class="regions-overlay">
                    <div class="region" onclick="handleRegionClick(1)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Quận</div>
                            <div class="region-subtitle">Khám phá vị trí</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(2)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Tài Chính</div>
                            <div class="region-subtitle">Chọn giá</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(3)">
                        <div class="region-label">
                            <div class="region-title">Danh Sách Chọn Lọc</div>
                            <div class="region-subtitle">Hot deals</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function handleRegionClick(region) {
            const link = document.getElementById('link' + region).value;
            if (link && link.trim()) {
                window.open(link, '_blank');
            } else {
                showStatus(`⚠️ Vùng ${region} chưa có link`, 'error');
            }
        }

        function fillLink(region, url) {
            document.getElementById('link' + region).value = url;
            if (url) showStatus(`✅ Link vùng ${region}`, 'success');
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status-message show ${type}`;
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        function generateHTML() {
            const image = currentImageUrl || 'https://via.placeholder.com/1200x400';
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;

            return `<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House - Bộ Lọc BĐS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow-x: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; }
        .header { text-align: center; color: white; padding: 20px; flex-shrink: 0; }
        .header h1 { font-size: clamp(20px, 5vw, 32px); margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .map-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 10px 20px; min-height: 0; overflow: hidden; }
        .map-container { position: relative; width: 100%; max-width: 1200px; aspect-ratio: 3 / 1; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .map-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .regions-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 10; }
        .region { flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .region:hover { background: rgba(0,0,0,0.2); }
        .region-label { text-align: center; color: white; text-shadow: 0 2px 8px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .region:hover .region-label { opacity: 1; }
        .region-title { font-size: clamp(12px, 3vw, 18px); font-weight: 600; margin-bottom: 4px; }
        .region-subtitle { font-size: clamp(10px, 2vw, 14px); opacity: 0.9; }
        @media (max-width: 640px) {
            .header { padding: 12px; }
            .map-wrapper { padding: 0 8px 12px; }
            .map-container { aspect-ratio: 16 / 9; border-radius: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏠 Khám Phá Bất Động Sản Phù Hợp</h1>
    </div>
    
    <div class="map-wrapper">
        <div class="map-container">
            <img src="${image}" alt="Property map" />
            <div class="regions-overlay">
                <div class="region" onclick="window.open('${link1}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Quận</div>
                        <div class="region-subtitle">Khám phá vị trí</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('${link2}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Tài Chính</div>
                        <div class="region-subtitle">Chọn giá</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('${link3}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Danh Sách Chọn Lọc</div>
                        <div class="region-subtitle">Hot deals</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>`;
        }

        function copyCode() {
            if (!currentImageUrl) {
                showStatus('❌ Upload ảnh trước', 'error');
                return;
            }
            navigator.clipboard.writeText(generateHTML()).then(() => {
                showStatus('✅ Copy thành công!', 'success');
            });
        }

        function downloadFile() {
            if (!currentImageUrl) {
                showStatus('❌ Upload ảnh trước', 'error');
                return;
            }
            const blob = new Blob([generateHTML()], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'property-map.html';
            a.click();
            showStatus('✅ Download thành công!', 'success');
        }

        function testLinks() {
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;

            if (!link1 || !link2 || !link3) {
                showStatus('⚠️ Vui lòng điền đầy đủ 3 links', 'error');
                return;
            }

            showStatus('✅ Links hợp lệ! Click vào ảnh để test', 'success');
        }

        // Auto-load saved data
        window.addEventListener('load', function() {
            const saved = localStorage.getItem('propertyMapData');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.image) setImagePreview(data.image);
                document.getElementById('link1').value = data.link1 || '';
                document.getElementById('link2').value = data.link2 || '';
                document.getElementById('link3').value = data.link3 || '';
            }
        });

        // Auto-save data
        document.addEventListener('change', function() {
            if (currentImageUrl) {
                localStorage.setItem('propertyMapData', JSON.stringify({
                    image: currentImageUrl,
                    link1: document.getElementById('link1').value,
                    link2: document.getElementById('link2').value,
                    link3: document.getElementById('link3').value
                }));
            }
        });
    </script>
</body>
</html>`;
