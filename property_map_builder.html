<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
        }
        
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        
        .regions-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
        }
        
        .region {
            flex: 1;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .region:hover {
            background: rgba(0,0,0,0.15);
        }
        
        .region-label {
            text-align: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
            padding: 0 10px;
        }
        
        .region:hover .region-label {
            opacity: 1;
        }
        
        .region-title {
            font-size: clamp(10px, 3vw, 16px);
            font-weight: 700;
            margin-bottom: 3px;
            line-height: 1.1;
        }
        
        .region-subtitle {
            font-size: clamp(8px, 2vw, 11px);
            opacity: 0.95;
            font-weight: 500;
        }
        
        .config-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .config-toggle:hover {
            background: #5568d3;
            transform: scale(1.1);
        }
        
        .config-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        
        .config-panel.active {
            transform: translateY(0);
        }
        
        .config-panel h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .config-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .config-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .config-item label {
            display: block;
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .config-item input,
        .config-item textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }
        
        .config-item textarea {
            resize: vertical;
            min-height: 60px;
        }
        
        .config-item input:focus,
        .config-item textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .suggestions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .suggestion-btn {
            background: white;
            border: 0.5px solid #ddd;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
        }
        
        .suggestion-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        
        button.btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #d5dbdd;
        }
        
        .status-message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
        }
        
        .status-message.show {
            display: block;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .hint {
            font-size: 10px;
            color: #7f8c8d;
            margin-top: 6px;
        }
        
        .config-panel::-webkit-scrollbar {
            width: 6px;
        }
        
        .config-panel::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="map-container" id="preview">
        <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f0f0f0; color: #999;">
            <div style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 12px;">📷</div>
                <div style="font-size: 14px;">Paste URL ảnh</div>
            </div>
        </div>
    </div>
    
    <button class="config-toggle" onclick="toggleConfig()">⚙️</button>
    
    <div class="config-panel" id="configPanel">
        <h2>
            Cấu hình
            <button class="config-close" onclick="toggleConfig()">✕</button>
        </h2>
        
        <div id="status" class="status-message"></div>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 12px; color: #7f8c8d; margin-bottom: 6px; font-weight: 600;">🌐 URL ảnh Cloudinary</label>
            <textarea id="imageUrl" placeholder="https://res.cloudinary.com/..."></textarea>
            <div class="hint">💡 Paste URL Secure từ Cloudinary</div>
            <button type="button" class="btn btn-secondary" onclick="loadImage()" style="width: 100%; margin-top: 8px;">📷 Load</button>
        </div>
        
        <div class="config-grid">
            <div class="config-item">
                <label>🔷 Vùng 1</label>
                <input type="text" id="link1" placeholder="https://..."/>
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(1, 'https://dulieunhapho.notion.site/L-C-B-S-THEO-QU-N')">Quận</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>🟩 Vùng 2</label>
                <input type="text" id="link2" placeholder="https://..."/>
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(2, 'https://dulieunhapho.notion.site/L-C-THEO-T-I-CH-NH')">Giá</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>⬜ Vùng 3</label>
                <input type="text" id="link3" placeholder="https://..."/>
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(3, 'https://dulieunhapho.notion.site/L-C-THEO-U-T-N')">Hot</button>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="copyCode()">📋 Copy</button>
            <button class="btn btn-secondary" onclick="downloadFile()">⬇️ Download</button>
            <button class="btn btn-secondary" onclick="testLinks()">🔗 Test</button>
        </div>
    </div>

    <script>
        let currentImageUrl = null;

        function toggleConfig() {
            document.getElementById('configPanel').classList.toggle('active');
        }

        function loadImage() {
            const url = document.getElementById('imageUrl').value.trim();
            if (!url) {
                showStatus('❌ Paste URL Cloudinary', 'error');
                return;
            }
            setImagePreview(url);
            showStatus('✅ Ảnh load thành công!', 'success');
        }

        function setImagePreview(src) {
            currentImageUrl = src;
            const preview = document.getElementById('preview');
            preview.innerHTML = `
                <img src="${src}" alt="Property map" />
                <div class="regions-overlay">
                    <div class="region" onclick="handleRegionClick(1)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Quận</div>
                            <div class="region-subtitle">Khám phá vị trí</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(2)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Tài Chính</div>
                            <div class="region-subtitle">Chọn giá</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(3)">
                        <div class="region-label">
                            <div class="region-title">Danh Sách Chọn Lọc</div>
                            <div class="region-subtitle">Hot deals</div>
                        </div>
                    </div>
                </div>
            `;
            saveData();
        }

        function handleRegionClick(region) {
            const link = document.getElementById('link' + region).value;
            if (link && link.trim()) {
                window.open(link, '_blank');
            } else {
                showStatus(`⚠️ Vùng ${region} chưa có link`, 'error');
            }
        }

        function fillLink(region, url) {
            document.getElementById('link' + region).value = url;
            showStatus(`✅ Link ${region}`, 'success');
            saveData();
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status-message show ${type}`;
            setTimeout(() => status.classList.remove('show'), 2000);
        }

        function generateHTML() {
            const imageUrl = currentImageUrl || 'https://via.placeholder.com/1200x400';
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;

            return `<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100vh; width: 100vw; overflow: hidden; }
        .map-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        .map-container img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
        .regions-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 10; }
        .region { flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .region:hover { background: rgba(0,0,0,0.15); }
        .region-label { text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .region:hover .region-label { opacity: 1; }
        .region-title { font-size: clamp(10px, 3vw, 16px); font-weight: 700; margin-bottom: 3px; }
        .region-subtitle { font-size: clamp(8px, 2vw, 11px); opacity: 0.95; font-weight: 500; }
    </style>
</head>
<body>
    <div class="map-container">
        <img src="${imageUrl}" alt="Property map" />
        <div class="regions-overlay">
            <div class="region" onclick="window.open('${link1}', '_blank')">
                <div class="region-label">
                    <div class="region-title">Lọc Theo Quận</div>
                    <div class="region-subtitle">Khám phá vị trí</div>
                </div>
            </div>
            <div class="region" onclick="window.open('${link2}', '_blank')">
                <div class="region-label">
                    <div class="region-title">Lọc Theo Tài Chính</div>
                    <div class="region-subtitle">Chọn giá</div>
                </div>
            </div>
            <div class="region" onclick="window.open('${link3}', '_blank')">
                <div class="region-label">
                    <div class="region-title">Danh Sách Chọn Lọc</div>
                    <div class="region-subtitle">Hot deals</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>`;
        }

        function copyCode() {
            if (!currentImageUrl) {
                showStatus('❌ Load ảnh trước', 'error');
                return;
            }
            navigator.clipboard.writeText(generateHTML());
            showStatus('✅ Copy HTML!', 'success');
        }

        function downloadFile() {
            if (!currentImageUrl) {
                showStatus('❌ Load ảnh trước', 'error');
                return;
            }
            const blob = new Blob([generateHTML()], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'property-map.html';
            a.click();
            showStatus('✅ Download!', 'success');
        }

        function testLinks() {
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;
            if (!link1 || !link2 || !link3) {
                showStatus('⚠️ Điền đầy đủ 3 links', 'error');
                return;
            }
            showStatus('✅ Links OK!', 'success');
        }

        function saveData() {
            if (currentImageUrl) {
                localStorage.setItem('propertyMapData', JSON.stringify({
                    imageUrl: currentImageUrl,
                    link1: document.getElementById('link1').value,
                    link2: document.getElementById('link2').value,
                    link3: document.getElementById('link3').value
                }));
            }
        }

        window.addEventListener('load', function() {
            const saved = localStorage.getItem('propertyMapData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('imageUrl').value = data.imageUrl || '';
                if (data.imageUrl) setImagePreview(data.imageUrl);
                document.getElementById('link1').value = data.link1 || '';
                document.getElementById('link2').value = data.link2 || '';
                document.getElementById('link3').value = data.link3 || '';
            }
        });

        document.addEventListener('change', saveData);
    </script>
</body>
</html>`;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('configPanel').classList.remove('active');
            }
        });
    </script>
</body>
</html>`;
