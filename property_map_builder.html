<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html, body { 
            height: 100%; 
            width: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .map-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        
        /* Desktop: slight border radius */
        @media (min-width: 1025px) {
            .map-container {
                width: calc(100% - 30px);
                height: calc(100% - 30px);
                margin: 15px;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            }
        }
        
        .regions-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
        }
        
        .region {
            flex: 1;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .region:hover {
            background: rgba(0,0,0,0.15);
        }
        
        .region-label {
            text-align: center;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 5;
            padding: 0 10px;
        }
        
        .region:hover .region-label {
            opacity: 1;
        }
        
        .region-title {
            font-size: clamp(11px, 3vw, 18px);
            font-weight: 700;
            margin-bottom: 4px;
            line-height: 1.2;
            letter-spacing: 0.3px;
        }
        
        .region-subtitle {
            font-size: clamp(9px, 2vw, 12px);
            opacity: 0.95;
            line-height: 1.2;
            font-weight: 500;
        }
        
        .config-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .config-toggle:hover {
            background: #5568d3;
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(102,126,234,0.5);
        }
        
        .config-panel {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }
        
        .config-panel.active {
            transform: translateY(0);
        }
        
        .config-panel h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .config-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7f8c8d;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        
        .config-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .config-item label {
            display: block;
            font-size: 11px;
            color: #7f8c8d;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .config-item input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }
        
        .config-item input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .config-item textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
            resize: vertical;
            min-height: 60px;
            background: white;
        }
        
        .config-item textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .suggestions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .suggestion-btn {
            background: white;
            border: 0.5px solid #ddd;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 80px;
        }
        
        .suggestion-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
        }
        
        button.btn {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #d5dbdd;
        }
        
        .status-message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            display: none;
        }
        
        .status-message.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* Scrollbar styling */
        .config-panel::-webkit-scrollbar {
            width: 6px;
        }
        
        .config-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .config-panel::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .config-panel::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        
        .hint {
            font-size: 10px;
            color: #7f8c8d;
            margin-top: 6px;
            line-height: 1.4;
        }
        
        @media (max-width: 640px) {
            .config-toggle {
                width: 45px;
                height: 45px;
                font-size: 18px;
                bottom: 15px;
                right: 15px;
            }
            
            .config-panel {
                max-width: 100%;
                border-radius: 20px 20px 0 0;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="map-wrapper">
        <div class="map-container" id="preview">
            <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #f0f0f0; color: #999;">
                <div style="text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 12px;">📷</div>
                    <div style="font-size: 14px;">Paste URL ảnh Cloudinary</div>
                </div>
            </div>
        </div>
    </div>
    
    <button class="config-toggle" id="toggleBtn" onclick="toggleConfig()">⚙️</button>
    
    <div class="config-panel" id="configPanel">
        <h2>
            Cấu hình
            <button class="config-close" onclick="toggleConfig()">✕</button>
        </h2>
        
        <div id="status" class="status-message"></div>
        
        <div style="margin-bottom: 14px;">
            <label style="display: block; font-size: 12px; color: #7f8c8d; margin-bottom: 6px; font-weight: 600;">🌐 URL ảnh Cloudinary</label>
            <textarea 
                id="imageUrl"
                placeholder="https://res.cloudinary.com/your-cloud/image/upload/v123/bds-map.png"
                style="width: 100%; padding: 10px; font-size: 11px; font-family: 'Courier New', monospace;"
            ></textarea>
            <div class="hint">💡 Paste URL Secure từ Cloudinary dashboard</div>
            <button type="button" class="btn btn-secondary" onclick="loadImageFromUrl()" style="width: 100%; margin-top: 8px; padding: 8px;">📷 Load Ảnh</button>
        </div>
        
        <div class="config-grid">
            <div class="config-item">
                <label>🔷 Vùng 1: Lọc Theo Quận</label>
                <input 
                    type="text" 
                    id="link1"
                    placeholder="https://..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(1, 'https://dulieunhapho.notion.site/L-C-B-S-THEO-QU-N')">📋 Danh sách quận</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>🟩 Vùng 2: Lọc Theo Tài Chính</label>
                <input 
                    type="text" 
                    id="link2"
                    placeholder="https://..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(2, 'https://dulieunhapho.notion.site/L-C-THEO-T-I-CH-NH')">💰 Danh sách giá</button>
                </div>
            </div>
            
            <div class="config-item">
                <label>⬜ Vùng 3: Danh Sách Chọn Lọc</label>
                <input 
                    type="text" 
                    id="link3"
                    placeholder="https://..."
                />
                <div class="suggestions">
                    <button type="button" class="suggestion-btn" onclick="fillLink(3, 'https://dulieunhapho.notion.site/L-C-THEO-U-T-N')">⭐ Danh sách hot</button>
                </div>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="btn btn-primary" type="button" onclick="copyCode()">📋 Copy HTML</button>
            <button class="btn btn-secondary" type="button" onclick="downloadFile()">⬇️ Download</button>
            <button class="btn btn-secondary" type="button" onclick="testLinks()">🔗 Test</button>
        </div>
    </div>

    <script>
        let currentImageUrl = null;

        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('active');
        }

        function loadImageFromUrl() {
            const url = document.getElementById('imageUrl').value.trim();
            
            if (!url) {
                showStatus('❌ Vui lòng paste URL Cloudinary', 'error');
                return;
            }
            
            if (!url.includes('cloudinary') && !url.includes('http')) {
                showStatus('⚠️ Vui lòng paste URL đầy đủ (bắt đầu bằng https://)', 'error');
                return;
            }
            
            setImagePreview(url);
            showStatus('✅ Ảnh Cloudinary load thành công!', 'success');
        }

        function setImagePreview(src) {
            currentImageUrl = src;
            const preview = document.getElementById('preview');
            preview.innerHTML = `
                <img src="${src}" alt="Property map" onerror="handleImageError()" />
                <div class="regions-overlay">
                    <div class="region" onclick="handleRegionClick(1)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Quận</div>
                            <div class="region-subtitle">Khám phá vị trí</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(2)">
                        <div class="region-label">
                            <div class="region-title">Lọc Theo Tài Chính</div>
                            <div class="region-subtitle">Chọn giá</div>
                        </div>
                    </div>
                    <div class="region" onclick="handleRegionClick(3)">
                        <div class="region-label">
                            <div class="region-title">Danh Sách Chọn Lọc</div>
                            <div class="region-subtitle">Hot deals</div>
                        </div>
                    </div>
                </div>
            `;
            
            saveData();
        }

        function handleImageError() {
            showStatus('❌ URL ảnh không tìm thấy hoặc không hợp lệ', 'error');
        }

        function handleRegionClick(region) {
            const link = document.getElementById('link' + region).value;
            if (link && link.trim()) {
                window.open(link, '_blank');
            } else {
                showStatus(`⚠️ Vùng ${region} chưa có link`, 'error');
            }
        }

        function fillLink(region, url) {
            document.getElementById('link' + region).value = url;
            if (url) showStatus(`✅ Link vùng ${region}`, 'success');
            saveData();
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `status-message show ${type}`;
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        function generateHTML() {
            const imageUrl = currentImageUrl || 'https://via.placeholder.com/1200x400';
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;

            return `<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white; display: flex; }
        .map-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; overflow: hidden; }
        .map-container { position: relative; width: 100%; height: 100%; border-radius: 0; overflow: hidden; background: #f0f0f0; }
        .map-container img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
        @media (min-width: 1025px) {
            .map-container {
                width: calc(100% - 30px);
                height: calc(100% - 30px);
                margin: 15px;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            }
        }
        .regions-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 10; }
        .region { flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .region:hover { background: rgba(0,0,0,0.15); }
        .region-label { text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .region:hover .region-label { opacity: 1; }
        .region-title { font-size: clamp(11px, 3vw, 18px); font-weight: 700; margin-bottom: 4px; }
        .region-subtitle { font-size: clamp(9px, 2vw, 12px); opacity: 0.95; font-weight: 500; }
    </style>
</head>
<body>
    <div class="map-wrapper">
        <div class="map-container">
            <img src="${imageUrl}" alt="Property map" />
            <div class="regions-overlay">
                <div class="region" onclick="window.open('${link1}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Quận</div>
                        <div class="region-subtitle">Khám phá vị trí</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('${link2}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Tài Chính</div>
                        <div class="region-subtitle">Chọn giá</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('${link3}', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Danh Sách Chọn Lọc</div>
                        <div class="region-subtitle">Hot deals</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>`;
        }

        function copyCode() {
            if (!currentImageUrl) {
                showStatus('❌ Load ảnh trước', 'error');
                return;
            }
            navigator.clipboard.writeText(generateHTML()).then(() => {
                showStatus('✅ Copy thành công!', 'success');
            });
        }

        function downloadFile() {
            if (!currentImageUrl) {
                showStatus('❌ Load ảnh trước', 'error');
                return;
            }
            const blob = new Blob([generateHTML()], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'property-map.html';
            a.click();
            showStatus('✅ Download thành công!', 'success');
        }

        function testLinks() {
            const link1 = document.getElementById('link1').value;
            const link2 = document.getElementById('link2').value;
            const link3 = document.getElementById('link3').value;

            if (!link1 || !link2 || !link3) {
                showStatus('⚠️ Vui lòng điền đầy đủ 3 links', 'error');
                return;
            }

            showStatus('✅ Links hợp lệ! Click vào ảnh để test', 'success');
        }

        function saveData() {
            if (currentImageUrl) {
                localStorage.setItem('propertyMapCloudinary', JSON.stringify({
                    imageUrl: currentImageUrl,
                    link1: document.getElementById('link1').value,
                    link2: document.getElementById('link2').value,
                    link3: document.getElementById('link3').value
                }));
            }
        }

        // Auto-load saved data
        window.addEventListener('load', function() {
            const saved = localStorage.getItem('propertyMapCloudinary');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('imageUrl').value = data.imageUrl || '';
                if (data.imageUrl) {
                    setImagePreview(data.imageUrl);
                }
                document.getElementById('link1').value = data.link1 || '';
                document.getElementById('link2').value = data.link2 || '';
                document.getElementById('link3').value = data.link3 || '';
            }
        });

        // Auto-save on change
        document.addEventListener('change', saveData);
    </script>
</body>
</html>`;
        }

        // Keyboard shortcut to toggle config (ESC key)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('configPanel').classList.remove('active');
            }
        });
    </script>
</body>
</html>`;
