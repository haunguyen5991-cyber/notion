<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #fff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .gallery {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  /* CHUYỂN NỀN MAIN VIEW SANG MÀU TRẮNG SANG TRỌNG */
  .main-view {
    flex: 1;
    position: relative;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .counter {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    z-index: 10;
  }

  #mainMediaWrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  #mainMediaWrap img, #mainMediaWrap video {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    min-width: 0;
    min-height: 0;
    object-fit: contain;
    transform-origin: center center;
    will-change: transform;
  }

  .brand-label {
    position: absolute;
    bottom: 4px;
    right: 6px;
    font-size: 10px;
    color: rgba(0,0,0,0.3); /* Đổi chữ sang màu tối để nổi bật trên nền trắng */
    font-weight: 500;
    pointer-events: none;
  }

  /* THANH THUMBNAIL MÀU XÁM SÁNG CHUẨN ẢNH 2 */
  .thumb-rail {
    height: 105px;
    background: #e4e4e4;
    border-top: 1px solid #ccc;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: auto;
    gap: 8px;
    padding: 0 10px;
  }

  /* Ẩn hoàn toàn thanh cuộn vật lý */
  .thumb-rail::-webkit-scrollbar {
    display: none;
  }
  .thumb-rail {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* THUMBNAIL HÌNH CHỮ NHẬT NGANG ĐẸP NHƯ ẢNH 2 */
  .thumb {
    width: 130px;
    height: 75px;
    flex-shrink: 0;
    background: #222;
    border: 1px solid #aaa;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    opacity: 0.4;
    border-radius: 2px;
    transition: all 0.2s ease;
  }

  .thumb img, .thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .thumb .play-icon {
    position: absolute;
    width: 24px;
    height: 24px;
    pointer-events: none;
  }

  /* THUMBNAIL KHI ĐƯỢC CHỌN (ACTIVE) CHUẨN ẢNH 2 */
  .thumb.active {
    border: 2px solid #000;
    opacity: 1;
    box-shadow: 0 0 4px rgba(0,0,0,0.2);
  }

  .thumb:hover {
    opacity: 0.8;
  }

  /* ===== ZOOM TRỰC TIẾP TRÊN ẢNH CHÍNH ===== */
  #mainMediaWrap img.zoomable {
    cursor: zoom-in;
  }
  #mainMediaWrap img.zoomable.zoomed {
    cursor: grab;
  }
  #mainMediaWrap img.zoomable.zoomed.dragging {
    cursor: grabbing;
  }
  .zoom-hint {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,0.85);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .main-view:hover .zoom-hint {
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="gallery">
    <div class="main-view" id="mainView">
      <div class="counter" id="counter">1 / 6</div>
      <div class="zoom-hint" id="zoomHint">Cuộn để phóng to • Kéo để xem từng phần</div>
      <div id="mainMediaWrap"></div>
      <div class="brand-label">dulieunhapho.com</div>
    </div>
    <div class="thumb-rail" id="thumbRail"></div>
  </div>

  <script>
    const items = [
      { url: 'https://res.cloudinary.com/oy7u6ywg/video/upload/v1783672544/T%E1%BB%95ng_quan_zw6hw8.mov', type: 'video' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/video/upload/v1783672549/Ti%E1%BB%87n_%C3%ADch_qqhv0v.mp4', type: 'video' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/video/upload/v1783672504/8024276529888_dbhlr8.mp4', type: 'video' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/video/upload/v1783672535/8024276708100_brxpay.mp4', type: 'video' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783674828/2a370a16-7f56-42c9-b2b9-0fa18e00e67e.png', type: 'image' },
      { url: 'https://datxanh.homes/wp-content/uploads/2025/01/mat-bang-tong-nha-pho-bcons-uni.jpg', type: 'image' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783675502/d47af77e-10a3-4b5b-b67c-5f2d735dce34.png', type: 'image' },
      { url: 'https://nhadatxanhmienbac.com/wp-content/uploads/2025/02/Bcons-Uni-Valley-Flycam-0602-01.jpg', type: 'image' },
      { url: 'https://res.cloudinary.com/oy7u6ywg/video/upload/v1783677365/%C4%90%C3%B4_th%E1%BB%8B_l%E1%BB%9Bn_rx2dzm.mp4', type: 'video' }
    ];

    let currentIndex = 0;

    function getVideoThumbUrl(videoUrl) {
      return videoUrl
        .replace('/video/upload/', '/video/upload/so_0/')
        .replace(/\.(mov|mp4)(\?.*)?$/i, '.jpg$2');
    }

    function getPlayableVideoUrl(videoUrl) {
      return videoUrl.replace(/\.mov(\?.*)?$/i, '.mp4$1');
    }

    function updateMain() {
      const item = items[currentIndex];
      const wrap = document.getElementById('mainMediaWrap');
      wrap.innerHTML = '';

      if (item.type === 'video') {
        wrap.innerHTML = '<video src="' + getPlayableVideoUrl(item.url) + '" controls playsinline></video>';
      } else {
        wrap.innerHTML = '<img src="' + item.url + '" loading="lazy" class="zoomable">';
      }

      document.getElementById('counter').textContent = (currentIndex + 1) + ' / ' + items.length;
      document.getElementById('zoomHint').style.display = (item.type === 'video') ? 'none' : 'block';
      updateThumbs();
      resetZoom();
    }

    function updateThumbs() {
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === currentIndex);
        if (i === currentIndex) {
          t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      });
    }

    function initThumbs() {
      const rail = document.getElementById('thumbRail');
      items.forEach((item, idx) => {
        const t = document.createElement('div');
        t.className = 'thumb' + (idx === 0 ? ' active' : '');
        if (item.type === 'video') {
          const thumbImg = getVideoThumbUrl(item.url);
          t.innerHTML =
            '<img src="' + thumbImg + '" loading="lazy">' +
            '<svg class="play-icon" viewBox="0 0 24 24" fill="white" style="filter:drop-shadow(0 0 2px rgba(0,0,0,0.8))"><path d="M8 5v14l11-7z"/></svg>';
        } else {
          t.innerHTML = '<img src="' + item.url + '" loading="lazy">';
        }
        t.onclick = () => { currentIndex = idx; updateMain(); };
        rail.appendChild(t);
      });
    }

    // ===== ZOOM TRỰC TIẾP TRÊN ẢNH CHÍNH =====
    let zScale = 1, zPanX = 0, zPanY = 0;
    let zDragging = false, zStartX = 0, zStartY = 0, zStartPanX = 0, zStartPanY = 0;
    const Z_MIN = 1, Z_MAX = 6;

    function applyZoomTransform() {
      const img = document.querySelector('#mainMediaWrap img.zoomable');
      if (!img) return;
      img.style.transform = 'translate(' + zPanX + 'px,' + zPanY + 'px) scale(' + zScale + ')';
      img.classList.toggle('zoomed', zScale > Z_MIN);
    }

    function resetZoom() {
      zScale = 1; zPanX = 0; zPanY = 0;
      applyZoomTransform();
    }

    function clampZoomPan() {
      const maxPan = 3000;
      zPanX = Math.max(-maxPan, Math.min(maxPan, zPanX));
      zPanY = Math.max(-maxPan, Math.min(maxPan, zPanY));
    }

    function zoomAtPoint(delta, clientX, clientY, refEl) {
      const rect = refEl.getBoundingClientRect();
      const cx = clientX - rect.left - rect.width / 2;
      const cy = clientY - rect.top - rect.height / 2;

      const prevScale = zScale;
      zScale = Math.min(Z_MAX, Math.max(Z_MIN, zScale + delta));
      if (zScale === prevScale) return;

      const ratio = zScale / prevScale;
      zPanX = (zPanX - cx) * ratio + cx;
      zPanY = (zPanY - cy) * ratio + cy;

      if (zScale <= Z_MIN) { zPanX = 0; zPanY = 0; }
      clampZoomPan();
      applyZoomTransform();
    }

    (function() {
      const wrap = document.getElementById('mainMediaWrap');

      wrap.addEventListener('wheel', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.3 : -0.3;
        zoomAtPoint(delta, e.clientX, e.clientY, wrap);
      }, { passive: false });

      wrap.addEventListener('mousedown', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img || zScale <= Z_MIN) return;
        zDragging = true;
        img.classList.add('dragging');
        zStartX = e.clientX; zStartY = e.clientY;
        zStartPanX = zPanX; zStartPanY = zPanY;
      });
      window.addEventListener('mousemove', function(e) {
        if (!zDragging) return;
        zPanX = zStartPanX + (e.clientX - zStartX);
        zPanY = zStartPanY + (e.clientY - zStartY);
        clampZoomPan();
        applyZoomTransform();
      });
      window.addEventListener('mouseup', function() {
        if (!zDragging) return;
        zDragging = false;
        const img = wrap.querySelector('img.zoomable');
        if (img) img.classList.remove('dragging');
      });

      wrap.addEventListener('dblclick', function() {
        if (wrap.querySelector('img.zoomable')) resetZoom();
      });

      let zLastTouchDist = null;
      wrap.addEventListener('touchstart', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        if (e.touches.length === 2) {
          zLastTouchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        } else if (e.touches.length === 1 && zScale > Z_MIN) {
          zDragging = true;
          zStartX = e.touches[0].clientX; zStartY = e.touches[0].clientY;
          zStartPanX = zPanX; zStartPanY = zPanY;
        }
      }, { passive: true });

      wrap.addEventListener('touchmove', function(e) {
        const img = wrap.querySelector('img.zoomable');
        if (!img) return;
        if (e.touches.length === 2 && zLastTouchDist !== null) {
          e.preventDefault();
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          const delta = (dist - zLastTouchDist) * 0.01;
          zoomAtPoint(delta, midX, midY, wrap);
          zLastTouchDist = dist;
        } else if (e.touches.length === 1 && zDragging) {
          e.preventDefault();
          zPanX = zStartPanX + (e.touches[0].clientX - zStartX);
          zPanY = zStartPanY + (e.touches[0].clientY - zStartY);
          clampZoomPan();
          applyZoomTransform();
        }
      }, { passive: false });

      wrap.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) zLastTouchDist = null;
        if (e.touches.length === 0) zDragging = false;
      }, { passive: true });
    })();

    initThumbs();
    updateMain();
  </script>
</body>
</html>
