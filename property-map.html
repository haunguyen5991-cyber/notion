<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiên Hạo House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white; }
        .map-wrapper { width: 100%; display: flex; align-items: center; justify-content: center; }
        .map-container { position: relative; width: 100%; overflow: hidden; background: white; }
        .map-container img { width: 100%; height: auto; display: block; }
        @media (min-width: 1025px) {
            html, body { height: 100vh; overflow: hidden; }
            .map-wrapper { height: 100vh; }
            .map-container { height: 100%; }
            .map-container img { height: 100%; object-fit: cover; }
        }
        .regions-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 10; }
        .region { flex: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .region:hover { background: rgba(0,0,0,0.15); }
        .region-label { text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .region:hover .region-label { opacity: 1; }
        .region-title { font-size: clamp(10px, 3vw, 16px); font-weight: 700; margin-bottom: 3px; }
        .region-subtitle { font-size: clamp(8px, 2vw, 11px); opacity: 0.95; font-weight: 500; }
    </style>
</head>
<body>
    <div class="map-wrapper">
        <div class="map-container">
            <img src="https://res.cloudinary.com/dcspxywol/image/upload/v1782562110/L%E1%BB%8Dc_gnolpu.png" alt="Property map" />
            <div class="regions-overlay">
                <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-B-S-THEO-QU-N-37e6bd685348807baefbd88256d8527c?pvs=74', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Quận</div>
                        <div class="region-subtitle">Khám phá vị trí</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-THEO-T-I-CH-NH-3886bd6853488090b2aed4dbd6df5970?pvs=74', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Lọc Theo Tài Chính</div>
                        <div class="region-subtitle">Chọn giá</div>
                    </div>
                </div>
                <div class="region" onclick="window.open('https://dulieunhapho.notion.site/L-C-THEO-U-TI-N-3886bd68534880b9b042f5bc3a90a15c?pvs=74', '_blank')">
                    <div class="region-label">
                        <div class="region-title">Danh Sách Chọn Lọc</div>
                        <div class="region-subtitle">Hot deals</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
