    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        /* --- Gallery Grid Styling --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer; /* Thay đổi con trỏ chuột để báo hiệu có thể nhấn */
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* --- Lightbox Styling --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Nền tối mờ */
            display: none; /* Ẩn theo mặc định */
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Đảm bảo nằm trên cùng */
            cursor: zoom-out; /* Con trỏ báo hiệu có thể đóng */
        }

        .lightbox.active {
            display: flex; /* Hiển thị khi có class active */
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: default; /* Ngăn con trỏ zoom-out khi di chuột vào ảnh */
        }

        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 40px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .lightbox-close:hover {
            color: #ccc;
        }
    </style>
</head>

        // Hàm mở lightbox
