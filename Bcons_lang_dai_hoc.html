    <!-- JavaScript Xáŧ­ LÃ― Sáŧą Kiáŧn -->
    <script>
        const galleryImages = document.querySelectorAll('.gallery-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');

        // BášĨm vÃ o ášĢnh nÃ o thÃŽ máŧ ášĢnh ÄÃģ lÃŠn
        galleryImages.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('open');
            });
        });

        // HÃ m ÄÃģng lightbox
        function closeLightbox() {
            lightbox.classList.remove('open');
        }

        // BášĨm vÃ o nÃšt X Äáŧ ÄÃģng
        lightboxClose.addEventListener('click', closeLightbox);

        // BášĨm vÃ o khoášĢng Äen bÃŠn ngoÃ i ášĢnh Äáŧ ÄÃģng
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        // NhášĨn phÃ­m ESC trÃŠn bÃ n phÃ­m cÅĐng Äáŧ ÄÃģng
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
