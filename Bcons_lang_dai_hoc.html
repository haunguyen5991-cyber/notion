<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Ảnh Làng Đại Học Quốc Gia TP.HCM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .content-wrap {
            flex: 1;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        /* --- Grid ảnh --- */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer; 
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #e1e1e8;
        }

        footer a {
            color: inherit;
            text-decoration: none;
        }

        .footer-brand {
            opacity: 0.25; /* Rất mờ theo yêu cầu */
            transition: opacity 0.3s ease;
        }

        .footer-brand:hover {
            opacity: 0.8; /* Sáng lên nhẹ khi rê chuột vào */
        }

        /* --- Lightbox Phóng to & Lướt --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.open {
            display: flex;
            opacity: 1;
        }

        .lightbox img {
            max-width: 85%;
            max-height: 85%;
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox.open img {
            transform: scale(1);
        }

        /* --- Nút đóng (X) --- */
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            z-index: 1050;
            background: rgba(0,0,0,0.3);
            width: 45px;
            height: 45px;
            text-align: center;
            line-height: 45px;
            border-radius: 50%;
            opacity: 0.2;
            transition: opacity 0.3s ease, background 0.3s ease;
        }

        .lightbox-close:hover {
            opacity: 1;
            background: rgba(0,0,0,0.7);
        }

        /* --- Nút lướt Trái / Phải --- */
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 40px;
            color: #fff;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1050;
            user-select: none;
            opacity: 0.15;
            transition: opacity 0.3s ease, background 0.3s ease;
        }

        .lightbox-nav:hover {
            opacity: 0.9;
            background: rgba(0, 0, 0, 0.6);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }
    </style>
</head>

    <!-- Khung Lightbox Phóng to & Lướt -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <div class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</div>
        <img id="lightbox-img" src="" alt="Phóng to">
        <div class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</div>
    </div>

    <!-- JavaScript Xử Lý Sự Kiện -->
    <script>
        const galleryImages = document.querySelectorAll('.gallery-item img');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');
        const btnPrev = document.getElementById('lightbox-prev');
        const btnNext = document.getElementById('lightbox-next');

        let currentIndex = 0;
        const imagesSrcArray = Array.from(galleryImages).map(img => img.src);

        galleryImages.forEach((img, index) => {
            img.addEventListener('click', () => {
                currentIndex = index;
                updateLightboxImage();
                lightbox.classList.add('open');
            });
        });

        function updateLightboxImage() {
            lightboxImg.src = imagesSrcArray[currentIndex];
        }

        function showPrev(e) {
            e.stopPropagation();
            currentIndex = (currentIndex - 1 + imagesSrcArray.length) % imagesSrcArray.length;
            updateLightboxImage();
        }

        function showNext(e) {
            e.stopPropagation();
            currentIndex = (currentIndex + 1) % imagesSrcArray.length;
            updateLightboxImage();
        }

        btnPrev.addEventListener('click', showPrev);
        btnNext.addEventListener('click', showNext);

        function closeLightbox() {
            lightbox.classList.remove('open');
        }

        lightboxClose.addEventListener('click', closeLightbox);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') {
                closeLightbox();
            } else if (e.key === 'ArrowLeft') {
                currentIndex = (currentIndex - 1 + imagesSrcArray.length) % imagesSrcArray.length;
                updateLightboxImage();
            } else if (e.key === 'ArrowRight') {
                currentIndex = (currentIndex + 1) % imagesSrcArray.length;
                updateLightboxImage();
            }
        });
    </script>
