    <style>
        /* 1. ẨN HOÀN TOÀN THANH CUỘT CỦA TRANG VÀ KHÔNG TRỪA KHOẢNG TRỐNG (MARGIN) */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Ẩn thanh cuộn dọc và ngang của trình duyệt/khung nhúng */
            background-color: transparent; /* Để nền trong suốt, hòa vào màu nền Notion */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Khung chứa ảnh Masterplan */
        .map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }
        
        /* Ảnh nền Masterplan tự co giãn khít theo khung của Notion */
        .map-container img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Giữ nguyên tỉ lệ ảnh không bị móp méo */
        }

        /* --- KHUNG POP-UP MODAL --- */
        .popup-overlay {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }
