<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản Đồ Tương Tác Bcons Uni Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ẨN TOÀN BỘ THANH CUỘT TRÊN HỆ THỐNG TRÌNH DUYỆT */
  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    font-family: Arial, sans-serif;
    overflow: hidden !important; /* Khóa cuộn tuyệt đối */
    -ms-overflow-style: none;    /* IE và Edge */
    scrollbar-width: none;       /* Firefox */
  }

  html::-webkit-scrollbar, body::-webkit-scrollbar {
    display: none !important;    /* Chrome, Safari, Opera */
  }

  .map-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden !important;
  }

  /* GIỮ NGUYÊN GIAO DIỆN TRÊN DESKTOP */
  .map-wrapper {
    position: relative;
    display: inline-block;
  }

  .map-wrapper img {
    display: block;
    max-width: 100%;
    max-height: 100vh;
    object-fit: contain;
  }

  /* KHU VỰC THAY ĐỔI: XỬ LÝ PHÓNG TO ẢNH TRÊN MOBILE */
  @media screen and (max-width: 768px) {
    .map-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .map-wrapper img {
      width: 100% !important;
      height: 100% !important;
      max-height: 100vh !important;
      /* Phóng to lấp đầy (cover) chiều cao màn hình đứng của điện thoại, cắt bớt 2 bên */
      object-fit: cover !important; 
    }
  }

  /* --- KHUNG POP-UP MODAL CHI TIẾT --- */
  .popup-overlay {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
  }
  
  .popup-content {
    position: relative;
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 85%;
    max-width: 1000px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    text-align: center;
  }
  
  .popup-content h3 {
    margin-top: 0;
    margin-bottom: 15px;
    color: #222;
  }

  .img-viewport {
    position: relative;
    width: 100%;
    height: 65vh;
    overflow: hidden !important; /* Ẩn thanh cuộn của khung zoom */
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fdfdfd;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @media screen and (max-width: 768px) {
    .popup-content {
      width: 95%;
      padding: 15px 10px;
    }
    .img-viewport {
      height: 55vh;
    }
  }

  .img-viewport img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    transition: transform 0.1s ease-out;
  }
  
  .img-viewport img:active {
    cursor: grabbing;
  }

  .zoom-controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    padding: 6px 15px;
    border-radius: 30px;
    display: flex;
    gap: 15px;
    z-index: 10000;
  }
  
  .zoom-controls button {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }

  .close-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10001;
  }
</style>
</head>
<body>

  <div class="map-container">
    <div class="map-wrapper">
      <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783686087/masterplan_w7xmhr.jpg" usemap="#image-map" id="mapImage">
      
      <map name="image-map">
        <area target="" alt="Layout 1" title="Layout 1" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png" coords="767,1682,794,1594,1077,1704,1050,1782,918,1736" shape="poly">
        <area target="" alt="Layout 1" title="Layout 1" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png" coords="953,1466,984,1386,1172,1457,1141,1536" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="1311,1584,1430,1626,1340,1881,1220,1838" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="1472,1944,1351,1900,1443,1635,1563,1681" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="1059,1923,997,2044,1293,2201,1360,2084" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="726,1782,854,1829,803,1973,675,1926" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="1538,2179,1474,2296,1534,2329,1600,2209" shape="poly">
        <area target="" alt="Layout 3" title="Layout 3" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg" coords="1083,926,1264,978,1201,1206,1033,1159" shape="poly">
        <area target="" alt="Layout 3" title="Layout 3" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg" coords="1379,972,1560,1021,1481,1316,1300,1266" shape="poly">
        <area target="" alt="Layout 3" title="Layout 3" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg" coords="1572,979,1746,1025,1649,1395,1475,1350" shape="poly">
        <area target="" alt="Layout 3" title="Layout 3" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg" coords="674,1928,853,1990,829,2058,652,1990" shape="poly">
        <area target="" alt="Layout 4" title="Layout 4" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg" coords="1344,1277,1311,1402,1446,1464,1483,1317" shape="poly">
        <area target="" alt="Layout 4" title="Layout 4" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg" coords="1475,1348,1613,1386,1578,1522,1446,1463" shape="poly">
        <area target="" alt="Layout 4" title="Layout 4" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg" coords="958,2022,1092,2095,1059,2192,922,2117" shape="poly">
        <area target="" alt="Layout 5" title="Layout 5" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg" coords="436,943,396,1042,800,1197,840,1091" shape="poly">
        <area target="" alt="Layout 6" title="Layout 6" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg" coords="840,1089,800,1195,1117,1321,1165,1195,1032,1159" shape="poly">
        <area target="" alt="Layout 6" title="Layout 6" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg" coords="1675,1705,1810,1751,1976,1078,1855,1045,1768,1374,1720,1557,1711,1599" shape="poly">
        <area target="" alt="Layout 2" title="Layout 2" href="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg" coords="1675,1704,1808,1750,1684,2068,1561,2022" shape="poly">
      </map>
    </div>
  </div>

  <div id="layoutModal" class="popup-overlay" onclick="closePopupOutside(event)">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()">&times;</button>
      <h3 id="popup-title">Chi tiết mặt bằng</h3>
      <div class="img-viewport" id="viewport">
        <img id="popup-img" src="" alt="Layout chi tiết">
        <div class="zoom-controls" onclick="event.stopPropagation()">
          <button id="btn-zoom-in">🔍 +</button>
          <button id="btn-zoom-out">🔍 -</button>
          <button id="btn-zoom-reset">↺</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const popupImg = document.getElementById('popup-img');
    const viewport = document.getElementById('viewport');
    let scale = 1, translateX = 0, translateY = 0;
    let isDragging = false, startX = 0, startY = 0;

    function updateTransform() {
      popupImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }

    function resetZoom() {
      scale = 1; translateX = 0; translateY = 0;
      updateTransform();
    }

    // Xử lý sự kiện click vào các lô đất
    document.querySelectorAll('area').forEach(area => {
      area.addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('popup-title').textContent = this.getAttribute('title');
        popupImg.src = this.getAttribute('href');
        resetZoom();
        document.getElementById('layoutModal').style.display = 'flex';
      });
    });

    // Các tính năng zoom cho popup modal
    document.getElementById('btn-zoom-in').onclick = () => { scale = Math.min(5, scale * 1.25); updateTransform(); };
    document.getElementById('btn-zoom-out').onclick = () => { scale = Math.max(0.8, scale / 1.25); updateTransform(); };
    document.getElementById('btn-zoom-reset').onclick = resetZoom;

    // Kéo thả chuột
    popupImg.addEventListener('mousedown', (e) => {
      e.preventDefault(); isDragging = true;
      startX = e.clientX - translateX; startY = e.clientY - translateY;
      popupImg.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX; translateY = e.clientY - startY;
      updateTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; popupImg.style.cursor = 'grab'; });

    // Cảm ứng kéo/zoom đa điểm trên mobile
    let touchStartDist = null;
    popupImg.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX; startY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });

    popupImg.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && isDragging) {
        e.preventDefault();
        translateX = e.touches[0].clientX - startX; translateY = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2 && touchStartDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        scale = Math.min(5, Math.max(0.8, scale + (dist - touchStartDist) * 0.01));
        touchStartDist = dist;
        updateTransform();
      }
    }, { passive: false });

    window.addEventListener('touchend', () => { isDragging = false; touchStartDist = null; });

    function closePopup() { document.getElementById('layoutModal').style.display = 'none'; popupImg.src = ''; }
    function closePopupOutside(e) { if (e.target.id === 'layoutModal') closePopup(); }
  </script>
</body>
</html>
