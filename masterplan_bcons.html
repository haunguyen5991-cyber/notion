<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản Đồ Tương Tác Bcons Uni Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  /* ⚠️ CỐT LÕI: container luôn lấp đầy đúng 100% khung Notion cấp cho (dù Notion đặt
     chiều cao bao nhiêu), ảnh dùng object-fit:contain để tự co giãn vừa khít bên trong,
     không tràn, không dư khoảng trống — không cần chỉnh tay theo desktop/mobile nữa. */
  .map-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    overflow: hidden;
  }

  .map-container img.masterplan {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* SVG chứa các vùng polygon click — được JS định vị chính xác khớp với vùng ảnh
     thực tế đang hiển thị (sau khi object-fit:contain co giãn/letterbox) */
  .hotspot-svg {
    position: absolute;
    pointer-events: none;
  }
  .hotspot-svg polygon {
    fill: rgba(255, 153, 0, 0);
    stroke: transparent;
    stroke-width: 2;
    cursor: pointer;
    pointer-events: all;
    transition: fill 0.15s, stroke 0.15s;
    vector-effect: non-scaling-stroke;
  }
  .hotspot-svg polygon:hover {
    fill: rgba(255, 153, 0, 0.35);
    stroke: rgba(255, 102, 0, 0.9);
  }

  /* ===== MODAL POPUP ===== */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.active { display: flex; }

  .popup-content {
    position: relative;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 1000px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    text-align: center;
  }
  .popup-content h3 {
    margin-bottom: 12px;
    color: #222;
    font-size: 16px;
  }

  .img-viewport {
    position: relative;
    width: 100%;
    height: 65vh;
    overflow: hidden;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fdfdfd;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-viewport img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    transition: transform 0.08s ease-out;
  }
  .img-viewport img.dragging { cursor: grabbing; transition: none; }

  .zoom-controls {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    padding: 6px 15px;
    border-radius: 30px;
    display: flex;
    gap: 15px;
    z-index: 10;
  }
  .zoom-controls button {
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }
  .zoom-controls button:hover { color: #ff9900; }

  .close-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .close-btn:hover { background: #cc0000; }
</style>
</head>
<body>

  <div class="map-container" id="mapContainer">
    <img class="masterplan" id="masterplanImg"
         src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783686087/masterplan_w7xmhr.jpg"
         alt="Masterplan">
    <svg class="hotspot-svg" id="hotspotSvg"></svg>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-content">
      <button class="close-btn" id="closeBtn">&times;</button>
      <h3 id="popupTitle">Chi tiết mặt bằng</h3>
      <div class="img-viewport" id="viewport">
        <img id="popupImg" src="" alt="Layout chi tiết">
        <div class="zoom-controls" id="zoomControls">
          <button id="btnZoomIn" title="Phóng to">🔍 +</button>
          <button id="btnZoomOut" title="Thu nhỏ">🔍 -</button>
          <button id="btnZoomReset" title="Đặt lại">↺</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ Toạ độ polygon giữ NGUYÊN theo pixel gốc của ảnh masterplan (không đổi gì so với bản cũ)
    const zones = [
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png',
        points: '767,1682 794,1594 1077,1704 1050,1782 918,1736' },
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png',
        points: '953,1466 984,1386 1172,1457 1141,1536' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '1311,1584 1430,1626 1340,1881 1220,1838' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '1472,1944 1351,1900 1443,1635 1563,1681' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '1059,1923 997,2044 1293,2201 1360,2084' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '726,1782 854,1829 803,1973 675,1926' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '1538,2179 1474,2296 1534,2329 1600,2209' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg',
        points: '1083,926 1264,978 1201,1206 1033,1159' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg',
        points: '1379,972 1560,1021 1481,1316 1300,1266' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg',
        points: '1572,979 1746,1025 1649,1395 1475,1350' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg',
        points: '674,1928 853,1990 829,2058 652,1990' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg',
        points: '1344,1277 1311,1402 1446,1464 1483,1317' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg',
        points: '1475,1348 1613,1386 1578,1522 1446,1463' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg',
        points: '958,2022 1092,2095 1059,2192 922,2117' },
      { title: 'Layout 5', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg',
        points: '436,943 396,1042 800,1197 840,1091' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg',
        points: '840,1089 800,1195 1117,1321 1165,1195 1032,1159' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg',
        points: '1675,1705 1810,1751 1976,1078 1855,1045 1768,1374 1720,1557 1711,1599' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        points: '1675,1704 1808,1750 1684,2068 1561,2022' }
    ];

    const SVG_NS = 'http://www.w3.org/2000/svg';
    const img = document.getElementById('masterplanImg');
    const svg = document.getElementById('hotspotSvg');
    const container = document.getElementById('mapContainer');

    function buildSVG() {
      svg.innerHTML = '';
      svg.setAttribute('viewBox', '0 0 ' + img.naturalWidth + ' ' + img.naturalHeight);
      zones.forEach(zone => {
        const poly = document.createElementNS(SVG_NS, 'polygon');
        poly.setAttribute('points', zone.points);
        poly.addEventListener('click', () => openPopup(zone.title, zone.image));
        svg.appendChild(poly);
      });
    }

    // Tính đúng vùng ảnh THẬT SỰ đang hiển thị bên trong container sau khi
    // object-fit:contain co giãn (có thể bị letterbox 2 bên hoặc trên/dưới),
    // rồi đặt SVG khớp chính xác lên đúng vùng đó.
    function positionSVG() {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const nw = img.naturalWidth;
      const nh = img.naturalHeight;
      if (!nw || !nh || !cw || !ch) return;

      const scale = Math.min(cw / nw, ch / nh);
      const renderW = nw * scale;
      const renderH = nh * scale;
      const offsetX = (cw - renderW) / 2;
      const offsetY = (ch - renderH) / 2;

      svg.style.left = offsetX + 'px';
      svg.style.top = offsetY + 'px';
      svg.style.width = renderW + 'px';
      svg.style.height = renderH + 'px';
    }

    function refresh() {
      buildSVG();
      positionSVG();
    }

    if (img.complete && img.naturalWidth) {
      refresh();
    } else {
      img.addEventListener('load', refresh);
    }
    window.addEventListener('resize', positionSVG);

    // ===== MODAL: zoom / pan (vanilla JS, không phụ thuộc jQuery) =====
    let scale = 1, translateX = 0, translateY = 0;
    let isDragging = false, startX = 0, startY = 0;

    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupImg = document.getElementById('popupImg');
    const viewport = document.getElementById('viewport');
    const closeBtn = document.getElementById('closeBtn');

    function updateTransform() {
      popupImg.style.transform = 'translate(' + translateX + 'px,' + translateY + 'px) scale(' + scale + ')';
    }

    function resetZoom() {
      scale = 1; translateX = 0; translateY = 0;
      updateTransform();
    }

    function openPopup(title, imageUrl) {
      popupTitle.textContent = title;
      popupImg.src = imageUrl;
      resetZoom();
      popupOverlay.classList.add('active');
    }

    function closePopup() {
      popupOverlay.classList.remove('active');
      popupImg.src = '';
    }

    closeBtn.onclick = closePopup;
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopup();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePopup();
    });

    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = 1.1;
      if (e.deltaY < 0) { if (scale < 5) scale *= factor; }
      else { if (scale > 0.8) scale /= factor; }
      updateTransform();
    }, { passive: false });

    document.getElementById('btnZoomIn').onclick = () => { if (scale < 5) { scale *= 1.25; updateTransform(); } };
    document.getElementById('btnZoomOut').onclick = () => { if (scale > 0.8) { scale /= 1.25; updateTransform(); } };
    document.getElementById('btnZoomReset').onclick = resetZoom;

    popupImg.addEventListener('mousedown', (e) => {
      e.preventDefault();
      isDragging = true;
      popupImg.classList.add('dragging');
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      updateTransform();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      popupImg.classList.remove('dragging');
    });

    // Hỗ trợ chạm/kéo trên mobile trong popup
    let touchStartDist = null;
    popupImg.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        touchStartDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: true });
    popupImg.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && isDragging) {
        e.preventDefault();
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        updateTransform();
      } else if (e.touches.length === 2 && touchStartDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const delta = (dist - touchStartDist) * 0.01;
        scale = Math.min(5, Math.max(0.8, scale + delta));
        touchStartDist = dist;
        updateTransform();
      }
    }, { passive: false });
    popupImg.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) touchStartDist = null;
      if (e.touches.length === 0) isDragging = false;
    }, { passive: true });
  </script>

</body>
</html>
