<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản Đồ Tương Tác Bcons Uni Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ẨN TOÀN BỘ THANH CUỘT */
  html, body {
    width: 100%;
    height: 100%;
    background: #ffffff;
    font-family: Arial, sans-serif;
    overflow: hidden !important;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none !important; }

  .map-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #ffffff;
    overflow: hidden;
    cursor: grab;
  }
  .map-container:active { cursor: grabbing; }

  /* Khung chứa ảnh và các vùng bấm tương tác */
  .map-wrapper {
    position: absolute;
    transform-origin: center center;
    will-change: transform;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .map-wrapper img {
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* SVG chứa các vùng chọn đa giác động */
  .hotspot-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  
  .hotspot-svg polygon {
    fill: rgba(255, 153, 0, 0);
    stroke: transparent;
    stroke-width: 2;
    cursor: pointer;
    pointer-events: all;
    transition: fill 0.15s, stroke 0.15s;
    vector-effect: non-scaling-stroke;
  }
  
  .hotspot-svg polygon:hover {
    fill: rgba(255, 153, 0, 0.25);
    stroke: rgba(255, 102, 0, 0.8);
  }

  /* --- POPUP MODAL --- */
  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
  }
  
  .popup-content {
    position: relative;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 85%;
    max-width: 1000px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    text-align: center;
  }
  
  .popup-content h3 { margin-bottom: 15px; color: #222; }

  .img-viewport {
    position: relative;
    width: 100%;
    height: 65vh;
    overflow: hidden !important;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fdfdfd;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  @media screen and (max-width: 768px) {
    .popup-content { width: 95%; padding: 15px 10px; }
    .img-viewport { height: 55vh; }
  }

  .img-viewport img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
  }
  .img-viewport img:active { cursor: grabbing; }

  .zoom-controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    padding: 6px 15px;
    border-radius: 30px;
    display: flex;
    gap: 15px;
    z-index: 10000;
  }
  
  .zoom-controls button {
    background: none;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }

  .close-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10001;
  }
</style>
</head>
<body>

  <div class="map-container" id="container">
    <div class="map-wrapper" id="wrapper">
      <img src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783686087/masterplan_w7xmhr.jpg" id="mapImage" alt="Masterplan">
      <svg class="hotspot-svg" id="hotspotSvg"></svg>
    </div>
  </div>

  <div id="layoutModal" class="popup-overlay" onclick="closePopupOutside(event)">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()">&times;</button>
      <h3 id="popup-title">Chi tiết mặt bằng</h3>
      <div class="img-viewport" id="viewport">
        <img id="popup-img" src="" alt="Layout chi tiết">
        <div class="zoom-controls" onclick="event.stopPropagation()">
          <button id="btn-zoom-in">🔍 +</button>
          <button id="btn-zoom-out">🔍 -</button>
          <button id="btn-zoom-reset">↺</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Toạ độ đa giác pixel gốc
    const zones = [
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png', points: '767,1682 794,1594 1077,1704 1050,1782 918,1736' },
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png', points: '953,1466 984,1386 1172,1457 1141,1536' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1311,1584 1430,1626 1340,1881 1220,1838' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1472,1944 1351,1900 1443,1635 1563,1681' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1059,1923 997,2044 1293,2201 1360,2084' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '726,1782 854,1829 803,1973 675,1926' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1538,2179 1474,2296 1534,2329 1600,2209' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1083,926 1264,978 1201,1206 1033,1159' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1379,972 1560,1021 1481,1316 1300,1266' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1572,979 1746,1025 1649,1395 1475,1350' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '674,1928 853,1990 829,2058 652,1990' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '1344,1277 1311,1402 1446,1464 1483,1317' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '1475,1348 1613,1386 1578,1522 1446,1463' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '958,2022 1092,2095 1059,2192 922,2117' },
      { title: 'Layout 5', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg', points: '436,943 396,1042 800,1197 840,1091' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg', points: '840,1089 800,1195 1117,1321 1165,1195 1032,1159' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg', points: '1675,1705 1810,1751 1976,1078 1855,1045 1768,1374 1720,1557 1711,1599' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1675,1704 1808,1750 1684,2068 1561,2022' }
    ];

    const container = document.getElementById('container');
    const wrapper = document.getElementById('wrapper');
    const img = document.getElementById('mapImage');
    const svg = document.getElementById('hotspotSvg');

    let currentScale = 1;
    let posX = 0, posY = 0;
    let isPanning = false;
    let startX = 0, startY = 0;

    // Thiết lập kích thước ảnh ban đầu linh hoạt theo thiết bị
    function initMapSize() {
      const nw = img.naturalWidth;
      const nh = img.naturalHeight;
      if (!nw) return;

      const cw = container.clientWidth;
      const ch = container.clientHeight;

      // Desktop: Vừa màn hình. Mobile (Màn đứng): Tự động phóng to theo chiều cao để lấp khoảng trắng
      if (cw < ch) {
        currentScale = ch / nh; 
      } else {
        currentScale = Math.min(cw / nw, ch / nh);
      }

      wrapper.style.width = nw + 'px';
      wrapper.style.height = nh + 'px';
      
      posX = (cw - nw * currentScale) / 2;
      posY = (ch - nh * currentScale) / 2;
      
      applyTransform();
      buildSVG(nw, nh);
    }

    function buildSVG(w, h) {
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      svg.innerHTML = '';
      zones.forEach(zone => {
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', zone.points);
        poly.addEventListener('click', (e) => {
          e.stopPropagation();
          openPopup(zone.title, zone.image);
        });
        poly.addEventListener('touchend', (e) => {
          // Tránh kích hoạt click khi đang dùng tay vuốt màn hình di chuyển
          if (!isPanning) {
            e.stopPropagation();
            openPopup(zone.title, zone.image);
          }
        });
        svg.appendChild(poly);
      });
    }

    function applyTransform() {
      wrapper.style.transform = `translate(${posX}px, ${posY}px) scale(${currentScale})`;
    }

    // === TÍNH NĂNG KÉO THẢ/DI CHUYỂN BẢN ĐỒ CHÍNH ===
    container.addEventListener('mousedown', (e) => {
      isPanning = true;
      startX = e.clientX - posX;
      startY = e.clientY - posY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      posX = e.clientX - startX;
      posY = e.clientY - startY;
      applyTransform();
    });

    window.addEventListener('mouseup', () => isPanning = false);

    // Xử lý vuốt trên Điện thoại mượt mà
    container.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isPanning = false; // reset
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
      }
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        isPanning = true; 
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        applyTransform();
      }
    }, { passive: false });

    container.addEventListener('touchend', () => {
      setTimeout(() => { isPanning = false; }, 50);
    });

    if (img.complete) initMapSize(); else img.onload = initMapSize;
    window.addEventListener('resize', initMapSize);

    // === GIAO DIỆN HỘP THOẠI POPUP ZOOM CHI TIẾT LÔ ĐẤT ===
    const popupImg = document.getElementById('popup-img');
    let pScale = 1, pTx = 0, pTy = 0;
    let pDragging = false, pStartX = 0, pStartY = 0;

    function updatePopupTransform() {
      popupImg.style.transform = `translate(${pTx}px, ${pTy}px) scale(${pScale})`;
    }

    function openPopup(title, url) {
      document.getElementById('popup-title').textContent = title;
      popupImg.src = url;
      pScale = 1; pTx = 0; pTy = 0;
      updatePopupTransform();
      document.getElementById('layoutModal').style.display = 'flex';
    }

    function closePopup() { document.getElementById('layoutModal').style.display = 'none'; popupImg.src = ''; }
    function closePopupOutside(e) { if (e.target.id === 'layoutModal') closePopup(); }

    document.getElementById('btn-zoom-in').onclick = () => { pScale = Math.min(5, pScale * 1.25); updatePopupTransform(); };
    document.getElementById('btn-zoom-out').onclick = () => { pScale = Math.max(0.8, pScale / 1.25); updatePopupTransform(); };
    document.getElementById('btn-zoom-reset').onclick = () => { pScale = 1; pTx = 0; pTy = 0; updatePopupTransform(); };

    // Kéo thả trong popup
    popupImg.addEventListener('mousedown', (e) => {
      e.preventDefault(); pDragging = true;
      pStartX = e.clientX - pTx; pStartY = e.clientY - pTy;
    });
    window.addEventListener('mousemove', (e) => {
      if (!pDragging) return;
      pTx = e.clientX - pStartX; pTy = e.clientY - pStartY;
      updatePopupTransform();
    });
    window.addEventListener('mouseup', () => pDragging = false);

    // Cảm ứng chạm đa điểm cho ảnh trong popup
    let pTouchDist = null;
    popupImg.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        pDragging = true;
        pStartX = e.touches[0].clientX - pTx; pStartY = e.touches[0].clientY - pTy;
      } else if (e.touches.length === 2) {
        pTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });

    popupImg.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && pDragging) {
        e.preventDefault();
        pTx = e.touches[0].clientX - pStartX; pTy = e.touches[0].clientY - pStartY;
        updatePopupTransform();
      } else if (e.touches.length === 2 && pTouchDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        pScale = Math.min(5, Math.max(0.8, pScale + (dist - pTouchDist) * 0.01));
        pTouchDist = dist;
        updatePopupTransform();
      }
    }, { passive: false });

    window.addEventListener('touchend', () => { pDragging = false; pTouchDist = null; });
  </script>
</body>
</html>
