<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bản Đồ Tương Tác Bcons Uni Valley</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 100%;
    background: #ffffff;
  }

  body {
    width: 100%;
    background: #ffffff;
    font-family: Arial, sans-serif;
    overflow-y: auto;
    overflow-x: hidden;
    max-height: 100vh;
  }

  /* THANH CUỘN MỎNG TINH TẾ (CUSTOM THIN SCROLLBAR) */
  body::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }
  body::-webkit-scrollbar-track {
    background: transparent;
  }
  body::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 4px;
  }
  body::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.4);
  }
  body {
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
  }

  .bottom-controls-container {
    position: fixed;
    bottom: 12px;
    right: 12px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    z-index: 500;
    background: rgba(255, 255, 255, 0.85);
    padding: 4px 10px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .main-map-controls {
    display: flex;
    align-items: center;
    gap: 5px;
    user-select: none;
  }
  .main-map-controls span {
    font-size: 11px;
    font-family: Arial, sans-serif;
    color: #333;
    font-weight: bold;
  }
  .main-map-controls input[type="range"] {
    width: 70px;
    height: 3px;
    accent-color: #ff9900;
    cursor: pointer;
    outline: none;
    border: none;
    background: rgba(0,0,0,0.15);
  }

  .brand-label {
    font-size: 11px;
    font-family: Arial, sans-serif;
    color: rgba(0, 0, 0, 0.5);
    border-left: 1px solid rgba(0, 0, 0, 0.15);
    padding-left: 8px;
    pointer-events: none;
    user-select: none;
  }

  .map-container {
    position: relative;
    width: 100%;
    overflow: hidden;
    background: #ffffff;
  }

  .map-container img.masterplan {
    display: block;
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }

  @media (max-width: 700px) {
    html, body {
      height: 100%;
      overflow: hidden;
    }
    .map-container {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: none;
    }
    .map-container img.masterplan {
      position: absolute;
      top: 0;
      left: 0;
      width: auto;
      height: auto;
      max-width: none;
      cursor: grab;
    }
    .map-container img.masterplan.dragging {
      cursor: grabbing;
    }

    .bottom-controls-container {
      right: 50%;
      transform: translateX(50%);
      bottom: 16px;
    }
  }

  .hotspot-svg {
    position: absolute;
    pointer-events: none;
  }
  .hotspot-svg polygon {
    fill: rgba(255, 153, 0, 0);
    stroke: transparent;
    stroke-width: 2;
    cursor: pointer;
    pointer-events: all;
    transition: fill 0.15s, stroke 0.15s;
    vector-effect: non-scaling-stroke;
  }
  .hotspot-svg polygon:hover {
    fill: rgba(255, 153, 0, 0.35);
    stroke: rgba(255, 102, 0, 0.9);
  }

  .pin-marker {
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.2s ease;
  }
  .pin-marker:hover {
    transform: scale(1.25);
  }

  .popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
  }
  .popup-overlay.active { display: flex; }
  .popup-content {
    position: relative;
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 1000px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    text-align: center;
  }
  .popup-content h3 { margin-bottom: 12px; color: #222; font-size: 16px; }
  .img-viewport {
    position: relative;
    width: 100%;
    height: 65vh;
    overflow: hidden;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fdfdfd;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-viewport img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    transition: transform 0.08s ease-out;
  }
  .img-viewport img.dragging { cursor: grabbing; transition: none; }
  .zoom-controls {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    padding: 6px 15px;
    border-radius: 30px;
    display: flex;
    gap: 15px;
    z-index: 10;
  }
  .zoom-controls button { background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; padding: 2px 6px; }
  .zoom-controls button:hover { color: #ff9900; }
  .close-btn {
    position: absolute;
    top: -12px;
    right: -12px;
    background: #ff4d4d;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
  }
  .close-btn:hover { background: #cc0000; }
</style>
</head>
<body>

  <div class="map-container" id="mapContainer">
    <img class="masterplan" id="masterplanImg"
         src="https://res.cloudinary.com/oy7u6ywg/image/upload/v1783686087/masterplan_w7xmhr.jpg"
         alt="Masterplan">
    <svg class="hotspot-svg" id="hotspotSvg"></svg>
  </div>

  <div class="bottom-controls-container">
    <div class="main-map-controls">
      <span>-</span>
      <input type="range" id="mapZoomSlider" min="1" max="3" step="0.02" value="1" title="Kéo để phóng to bản đồ">
      <span>+</span>
    </div>
    <div class="brand-label">dulieunhapho.com</div>
  </div>

  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-content">
      <button class="close-btn" id="closeBtn">&times;</button>
      <h3 id="popupTitle">Chi tiết mặt bằng</h3>
      <div class="img-viewport" id="viewport">
        <img id="popupImg" src="" alt="Layout chi tiết">
        <div class="zoom-controls" id="zoomControls">
          <button id="btnZoomIn" title="Phóng to">🔍 +</button>
          <button id="btnZoomOut" title="Thu nhỏ">🔍 -</button>
          <button id="btnZoomReset" title="Đặt lại">↺</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const zones = [
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png', points: '767,1682 794,1594 1077,1704 1050,1782 918,1736' },
      { title: 'Layout 1', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783683857/be680720-1432-463e-b7ea-85e082c5a861.png', points: '953,1466 984,1386 1172,1457 1141,1536' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1311,1584 1430,1626 1340,1881 1220,1838' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1472,1944 1351,1900 1443,1635 1563,1681' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1059,1923 997,2044 1293,2201 1360,2084' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '726,1782 854,1829 803,1973 675,1926' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1538,2179 1474,2296 1534,2329 1600,2209' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1083,926 1264,978 1201,1206 1033,1159' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1379,972 1560,1021 1481,1316 1300,1266' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '1572,979 1746,1025 1649,1395 1475,1350' },
      { title: 'Layout 3', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M3_jt8v6r.jpg', points: '674,1928 853,1990 829,2058 652,1990' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '1344,1277 1311,1402 1446,1464 1483,1317' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '1475,1348 1613,1386 1578,1522 1446,1463' },
      { title: 'Layout 4', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M4_fcxmci.jpg', points: '958,2022 1092,2095 1059,2192 922,2117' },
      { title: 'Layout 5', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678533/M5_vtfhxl.jpg', points: '436,943 396,1042 800,1197 840,1091' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg', points: '840,1089 800,1195 1117,1321 1165,1195 1032,1159' },
      { title: 'Layout 6', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678534/M6_yonyqn.jpg', points: '1675,1705 1810,1751 1976,1078 1855,1045 1768,1374 1720,1557 1711,1599' },
      { title: 'Layout 2', image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg', points: '1675,1704 1808,1750 1684,2068 1561,2022' }
    ];

    // CĂN B01 ĐƯỢC CHỈNH TỌA ĐỘ VỀ ĐÚNG VỈA HÈ TRƯỚC CĂN B01-76.5M2
    const customMarkers = [
      {
        title: 'Căn K11 (Layout 2)',
        image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        x: 1560, y: 1180,
        polygonPoints: '1443,1150 1515,1176 1485,1258 1413,1232'
      },
      {
        title: 'Căn B01 (Layout 2)',
        image: 'https://res.cloudinary.com/oy7u6ywg/image/upload/v1783678532/M2_us8qsf.jpg',
        x: 650, y: 2020, // Đặt chính xác trên vỉa hè đường N2 ngay trước cửa căn B01-76.5m2
        polygonPoints: '748,1605 820,1633 792,1712 720,1684'
      }
    ];

    const SVG_NS = 'http://www.w3.org/2000/svg';
    const img = document.getElementById('masterplanImg');
    const svg = document.getElementById('hotspotSvg');
    const container = document.getElementById('mapContainer');
    const zoomSlider = document.getElementById('mapZoomSlider');
    const mobileQuery = window.matchMedia('(max-width: 700px)');

    let mapZoomScale = 1;
    let panX = 0, panY = 0;
    let isMapDragging = false;
    let startX = 0, startY = 0;
    let startPanX = 0, startPanY = 0;
    let renderW = 0, renderH = 0;
    let minX = 0, maxX = 0, minY = 0, maxY = 0;

    function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

    function applyMapTransform() {
      const cw = container.clientWidth;
      const ch = container.clientHeight;

      if (mobileQuery.matches) {
        minX = cw - renderW * mapZoomScale;
        minY = ch - renderH * mapZoomScale;
        maxX = 0;
        maxY = 0;

        if (minX > 0) minX = 0;
        if (minY > 0) minY = 0;

        panX = clamp(panX, minX, maxX);
        panY = clamp(panY, minY, maxY);

        const transformStr = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + mapZoomScale + ')';
        img.style.transform = transformStr;
        svg.style.transform = transformStr;
      } else {
        if (mapZoomScale > 1) {
          const baseScaleW = cw;
          const baseScaleH = img.naturalHeight * (cw / img.naturalWidth);
          const maxMoveX = Math.max(0, (baseScaleW * mapZoomScale - cw) / 2);
          const maxMoveY = Math.max(0, (baseScaleH * mapZoomScale - baseScaleH) / 2);

          panX = clamp(panX, -maxMoveX, maxMoveX);
          panY = clamp(panY, -maxMoveY, maxMoveY);
        } else {
          panX = 0;
          panY = 0;
        }
        const transformStr = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + mapZoomScale + ')';
        img.style.transform = transformStr;
        svg.style.transform = transformStr;
      }
    }

    function positionSVG() {
      const cw = container.clientWidth;
      const ch = container.clientHeight;
      const nw = img.naturalWidth;
      const nh = img.naturalHeight;
      if (!nw || !nh || !cw || !ch) return;

      if (mobileQuery.matches) {
        const scale = Math.max(cw / nw, ch / nh);
        renderW = nw * scale;
        renderH = nh * scale;

        img.style.position = 'absolute';
        img.style.width = renderW + 'px';
        img.style.height = renderH + 'px';
        
        svg.style.left = '0px';
        svg.style.top = '0px';
        svg.style.width = renderW + 'px';
        svg.style.height = renderH + 'px';

        minX = cw - renderW;
        minY = ch - renderH;
        panX = clamp((cw - renderW) / 2, minX, 0);
        panY = clamp((ch - renderH) / 2, minY, 0);

        applyMapTransform();
      } else {
        img.style.position = '';
        img.style.width = '';
        img.style.height = '';
        const rect = img.getBoundingClientRect();
        renderW = rect.width;
        renderH = rect.height;
        svg.style.left = '0px';
        svg.style.top = '0px';
        svg.style.width = renderW + 'px';
        svg.style.height = renderH + 'px';
        applyMapTransform();
      }
    }

    function buildSVG() {
      svg.innerHTML = '';
      svg.setAttribute('viewBox', '0 0 ' + img.naturalWidth + ' ' + img.naturalHeight);
      
      zones.forEach(zone => {
        const poly = document.createElementNS(SVG_NS, 'polygon');
        poly.setAttribute('points', zone.points);
        poly.addEventListener('click', () => {
          openPopup(zone.title, zone.image);
        });
        svg.appendChild(poly);
      });

      customMarkers.forEach(marker => {
        const poly = document.createElementNS(SVG_NS, 'polygon');
        poly.setAttribute('points', marker.polygonPoints);
        poly.addEventListener('click', () => { openPopup(marker.title, marker.image); });
        svg.appendChild(poly);

        const g = document.createElementNS(SVG_NS, 'g');
        g.setAttribute('class', 'pin-marker');
        g.setAttribute('transform', 'translate(' + (marker.x - 20) + ',' + (marker.y - 48) + ')');
        g.addEventListener('click', (e) => {
          e.stopPropagation();
          openPopup(marker.title, marker.image);
        });

        g.innerHTML = `
          <path d="M20 0C8.954 0 0 8.954 0 20c0 14 20 30 20 30s20-16 20-30c0-11.046-8.954-20-20-20z" fill="#ff4d4d" stroke="#ffffff" stroke-width="2"/>
          <circle cx="20" cy="18" r="12" fill="#ffffff"/>
          <text x="20" y="22" font-size="10" font-weight="bold" fill="#222222" text-anchor="middle" font-family="Arial">${marker.title.split(' ')[1]}</text>
        `;
        svg.appendChild(g);
      });
    }

    function refresh() {
      buildSVG();
      positionSVG();
    }

    if (img.complete && img.naturalWidth) { refresh(); } 
    else { img.addEventListener('load', refresh); }
    window.addEventListener('resize', positionSVG);
    
    mobileQuery.addEventListener('change', () => {
      mapZoomScale = 1;
      zoomSlider.value = 1;
      refresh();
    });

    zoomSlider.addEventListener('input', (e) => {
      mapZoomScale = parseFloat(e.target.value);
      if (mapZoomScale < 1) mapZoomScale = 1;
      applyMapTransform();
    });

    container.addEventListener('mousedown', (e) => {
      isMapDragging = true;
      img.classList.add('dragging');
      startX = e.clientX;
      startY = e.clientY;
      startPanX = panX;
      startPanY = panY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!isMapDragging) return;
      panX = startPanX + (e.clientX - startX);
      panY = startPanY + (e.clientY - startY);
      applyMapTransform();
    });

    window.addEventListener('mouseup', () => {
      isMapDragging = false;
      img.classList.remove('dragging');
    });

    container.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return; 
      isMapDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startPanX = panX;
      startPanY = panY;
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
      if (!isMapDragging) return;
      e.preventDefault(); 
      panX = startPanX + (e.touches[0].clientX - startX);
      panY = startPanY + (e.touches[0].clientY - startY);
      applyMapTransform();
    }, { passive: false });

    container.addEventListener('touchend', () => {
      isMapDragging = false;
    }, { passive: true });

    let scale = 1, translateX = 0, translateY = 0;
    let isDragging = false, pStartX = 0, pStartY = 0;

    const popupOverlay = document.getElementById('popupOverlay');
    const popupTitle = document.getElementById('popupTitle');
    const popupImg = document.getElementById('popupImg');
    const viewport = document.getElementById('viewport');
    const closeBtn = document.getElementById('closeBtn');

    function updateTransform() {
      popupImg.style.transform = 'translate(' + translateX + 'px,' + translateY + 'px) scale(' + scale + ')';
    }
    function resetZoom() {
      scale = 1; translateX = 0; translateY = 0;
      updateTransform();
    }
    function openPopup(title, imageUrl) {
      popupTitle.textContent = title;
      popupImg.src = imageUrl;
      resetZoom();
      popupOverlay.classList.add('active');
    }
    function closePopup() {
      popupOverlay.classList.remove('active');
      popupImg.src = '';
    }

    closeBtn.onclick = closePopup;
    popupOverlay.addEventListener('click', (e) => { if (e.target === popupOverlay) closePopup(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = 1.1;
      if (e.deltaY < 0) { if (scale < 5) scale *= factor; }
      else { if (scale > 0.8) scale /= factor; }
      updateTransform();
    }, { passive: false });

    document.getElementById('btnZoomIn').onclick = () => { if (scale < 5) { scale *= 1.25; updateTransform(); } };
    document.getElementById('btnZoomOut').onclick = () => { if (scale > 0.8) { scale /= 1.25; updateTransform(); } };
    document.getElementById('btnZoomReset').onclick = resetZoom;

    popupImg.addEventListener('mousedown', (e) => {
      e.preventDefault(); isDragging = true;
      popupImg.classList.add('dragging');
      pStartX = e.clientX - translateX; pStartY = e.clientY - translateY;
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      translateX = e.clientX - pStartX; translateY = e.clientY - pStartY;
      updateTransform();
    });
    window.addEventListener('mouseup', () => { isDragging = false; popupImg.classList.remove('dragging'); });

    let touchStartDist = null;
    popupImg.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isDragging = true;
        pStartX = e.touches[0].clientX - translateX; pStartY = e.touches[0].clientY - translateY;
      } else if (e.touches.length === 2) {
        touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });
    popupImg.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && isDragging) {
        e.preventDefault();
        translateX = e.touches[0].clientX - pStartX; translateY = e.touches[0].clientY - pStartY;
        updateTransform();
      } else if (e.touches.length === 2 && touchStartDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const delta = (dist - touchStartDist) * 0.01;
        scale = Math.min(5, Math.max(0.8, scale + delta));
        touchStartDist = dist;
        updateTransform();
      }
    }, { passive: false });
    popupImg.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) touchStartDist = null;
      if (e.touches.length === 0) isDragging = false;
    }, { passive: true });
  </script>

</body>
</html>
